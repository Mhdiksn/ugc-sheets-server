      {/* مودال إضافة للبلاك ليست */}
      {blForm && (
        <div style={S.modalOverlay} onClick={() => setBlForm(null)}>
          <div style={S.modalCard} onClick={(e) => e.stopPropagation()}>
            <div style={S.panelTitle}>🚫 أضف للبلاك ليست</div>
            <p style={{ fontSize: 13, color: "#888780", margin: "0 0 14px", lineHeight: 1.6 }}>
              هذا الكريتور ما راح يُقترح بالكامبينات بعد اليوم. اكتب السبب ومنو يضيفه.
            </p>
            <div style={{ marginBottom: 10 }}>
              <label style={S.fieldLabel}>الاسم</label>
              <input style={S.input} value={blForm.name} onChange={(e) => setBlForm({ ...blForm, name: e.target.value })} />
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={S.fieldLabel}>الحساب</label>
              <input style={{ ...S.input, direction: "ltr", textAlign: "left" }} value={blForm.handle} onChange={(e) => setBlForm({ ...blForm, handle: e.target.value })} />
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={S.fieldLabel}>السبب</label>
              <input style={S.input} value={blForm.reason} onChange={(e) => setBlForm({ ...blForm, reason: e.target.value })} placeholder="مثلاً: ما نشر بعد الدفع" />
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={S.fieldLabel}>منو يضيفه؟</label>
              <input style={S.input} value={blForm.addedBy} onChange={(e) => setBlForm({ ...blForm, addedBy: e.target.value })} placeholder="اسمك" />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={S.dangerBtn} onClick={() => { addToBlacklist(blForm); setBlForm(null); }}>أضف للبلاك ليست</button>
              <button style={S.ghostBtn} onClick={() => setBlForm(null)}>إلغاء</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================================
// تبويب المساعد الذكي — يقرا سكرين شوت التحويل ويسجّل الدفعة
// ============================================================================
function ChatTab({ data, upd, softDelete }) {
  // ---- إدارة المحادثات (محفوظة دائماً) ----
  const conversations = data.conversations && data.conversations.length ? data.conversations : [];
  // تأكد من وجود محادثة نشطة
  React.useEffect(() => {
    if (!conversations.length) {
      const c = newConversation(data.defaultModel);
      upd((d) => {
        d.conversations = [c];
        d.activeConvId = c.id;
        return d;
      });
    } else if (!data.activeConvId || !conversations.find((c) => c.id === data.activeConvId)) {
      const firstId = conversations[0].id;
      upd((d) => {
        d.activeConvId = firstId;
        return d;
      });
    }
    // eslint-disable-next-line
  }, [conversations.length, data.activeConvId]);

  const activeConv = conversations.find((c) => c.id === data.activeConvId) || conversations[0] || null;
  const messages = activeConv ? activeConv.messages : [{ role: "ai", type: "text", text: WELCOME_TEXT }];
  const curModel = activeConv ? activeConv.model : data.defaultModel;

  const [busy, setBusy] = useState(false);
  const [textInput, setTextInput] = useState("");
  const [pendingImg, setPendingImg] = useState(null);
  const [pendingCsv, setPendingCsv] = useState(null); // {name, text} ملف CSV مرفوع
  const [publishReminder, setPublishReminder] = useState(null); // {url} بعد معالجة شيت — تذكير بإغلاق النشر
  const [showConvList, setShowConvList] = useState(false); // إظهار قائمة المحادثات
  const [showModels, setShowModels] = useState(false); // إظهار قائمة الموديلات
  const scrollRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const taRef = React.useRef(null);

  // مساعدات تعديل المحادثة النشطة (تحفظ دائماً عبر upd)
  const patchActive = (fn) => {
    upd((d) => {
      const conv = (d.conversations || []).find((c) => c.id === d.activeConvId);
      if (conv) fn(conv);
      return d;
    });
  };
  const addMsg = (m) => patchActive((conv) => { conv.messages = [...conv.messages, m]; });
  const pushApi = (entry) => patchActive((conv) => { conv.apiHistory = [...conv.apiHistory, entry]; });

  const startNewConversation = () => {
    const c = newConversation(curModel || data.defaultModel);
    upd((d) => {
      d.conversations = [c, ...(d.conversations || [])];
      d.activeConvId = c.id;
      return d;
    });
    setShowConvList(false);
  };
  const switchConversation = (id) => {
    upd((d) => { d.activeConvId = id; return d; });
    setShowConvList(false);
  };
  const deleteConversation = (id) => {
    upd((d) => {
      d.conversations = (d.conversations || []).filter((c) => c.id !== id);
      if (d.activeConvId === id) d.activeConvId = d.conversations[0] ? d.conversations[0].id : null;
      return d;
    });
  };
  const renameConversation = (id, currentTitle) => {
    const t = window.prompt("اسم المحادثة الجديد:", currentTitle || "");
    if (t === null) return; // ألغى
    const trimmed = t.trim();
    upd((d) => {
      const conv = (d.conversations || []).find((c) => c.id === id);
      if (conv) conv.title = trimmed || "محادثة";
      return d;
    });
  };
  const setModel = (modelId) => {
    patchActive((conv) => { conv.model = modelId; });
    upd((d) => { d.defaultModel = modelId; return d; });
    setShowModels(false);
  };

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, busy]);

  React.useEffect(() => {
    const onPaste = async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) {
        if (it.type.startsWith("image/")) {
          const file = it.getAsFile();
          if (file) {
            e.preventDefault();
            await attachImage(file);
          }
          return;
        }
      }
    };
    window.addEventListener("paste", onPaste);
    return () => window.removeEventListener("paste", onPaste);
  }, []);

  const fileToParts = (file) =>
    new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () =>
        res({ dataUrl: r.result, b64: r.result.split(",")[1], mediaType: file.type || "image/png" });
      r.onerror = () => rej(new Error("read failed"));
      r.readAsDataURL(file);
    });

  const attachImage = async (file) => {
    const parts = await fileToParts(file);
    setPendingImg(parts);
  };

  // يميّز نوع الملف: صورة أو CSV/نص
  const attachFile = async (file) => {
    const isImage = (file.type || "").startsWith("image/");
    const name = (file.name || "").toLowerCase();
    const isCsv =
      name.endsWith(".csv") ||
      name.endsWith(".tsv") ||
      name.endsWith(".txt") ||
      file.type === "text/csv" ||
      file.type === "text/plain";
    if (isImage) {
      await attachImage(file);
    } else if (isCsv) {
      const text = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(new Error("read failed"));
        r.readAsText(file);
      });
      setPendingCsv({ name: file.name || "ملف", text });
    } else {

      await attachImage(file);

  };

  const tools = [
    {

      input_schema: {

          amount: { type: "number", description: "المبلغ المستحق / السعر" },
          paid: { type: "number", description: "المدفوع لحد الآن، إذا ماكو خليه 0" },
          campaign: { type: "string", description: "اسم الكامبين أو البراند" },
          pubStatus: { type: "string", enum: ["published", "unpublished"], description: "حالة نشر الفيديو" },
          pubLink: { type: "string", description: "رابط النشر، مطلوب إذا pubStatus=published" },
          payStatus: { type: "string", enum: ["paid", "partial", "unpaid"], description: "حالة الدفع يدوياً، اختياري (الافتراضي يتحسب من المبلغ)" },
          note: { type: "string", description: "أي ملاحظة" },
        },
        required: ["name"],
      },
    },
    {
      name: "update_creator",
      description: "عدّل بيانات كريتور موجود. لازم تحدد creatorId. عدّل بس الحقول المذكورة.",
      input_schema: {
        type: "object",
        properties: {
          creatorId: { type: "string", description: "id الكريتور المراد تعديله" },
          name: { type: "string" },
          handle: { type: "string" },
          phone: { type: "string" },
          superKey: { type: "string" },
          amount: { type: "number" },
          paid: { type: "number" },
          campaign: { type: "string" },
          pubStatus: { type: "string", enum: ["published", "unpublished"] },
          pubLink: { type: "string", description: "رابط النشر" },
          payStatus: { type: "string", enum: ["paid", "partial", "unpaid"] },
          note: { type: "string" },
        },
        required: ["creatorId"],
      },
    },
    {
      name: "record_payment",
      description:
        "سجّل دفعة لكريتور (تنضاف لخانة المدفوع). استخدمها لمن المستخدم يگول دفع لكريتور، أو لمن تقرا سكرين شوت تحويل وتتعرف على الكريتور من السوبر كي.",
      input_schema: {
        type: "object",
        properties: {
          creatorId: { type: "string", description: "id الكريتور" },
          amount: { type: "number", description: "مبلغ الدفعة" },
          date: { type: "string", description: "تاريخ الدفعة YYYY-MM-DD، إذا ماكو خليه فارغ" },
        },
        required: ["creatorId", "amount"],
      },
    },
    {
      name: "delete_creators",
      description:
        "احذف كريتور أو أكثر من مدفوعات الكريتورز (حذف ناعم — يروح لسلة المحذوفات ويمكن استرجاعه). تطابق بالاسم أو الرابط أو الكامبين. لازم تطلب تأكيد المستخدم قبل أي حذف جماعي (أكثر من واحد). مرّر confirmed=true بس بعد ما يأكد المستخدم.",
      input_schema: {
        type: "object",
        properties: {
          names: { type: "array", items: { type: "string" }, description: "أسماء أو روابط الكريتورز المطلوب حذفهم (تطابق جزئي غير حساس لحالة الأحرف)" },
          campaign: { type: "string", description: "احذف كل كريتورز هذا الكامبين (اختياري — استخدمه بدل names إذا المستخدم يريد حذف كامبين كامل)" },
          confirmed: { type: "boolean", description: "true بس بعد ما يأكد المستخدم الحذف صراحة" },
        },
      },
    },
    {

      description: "أضف كامبين جديد بإيراد وتكلفة وتوزيع أرباح اختياري.",
      input_schema: {
        type: "object",
        properties: {
          name: { type: "string", description: "اسم الكامبين" },

          cost: { type: "number", description: "التكلفة الكلية" },

            items: {

              properties: { name: { type: "string" }, pct: { type: "number" } },
            },
          },
        },
        required: ["name"],
      },
    },
    {
      name: "add_expense",
      description: "أضف صرفية. النوع إما 'company' أو 'personal'.",
      input_schema: {
        type: "object",
        properties: {
          label: { type: "string", description: "بيان الصرفية" },
          amount: { type: "number" },
          type: { type: "string", enum: ["company", "personal"] },
          date: { type: "string", description: "YYYY-MM-DD" },
          note: { type: "string" },
        },
        required: ["label", "amount"],
      },

  const runTool = (name, input) => {
    let result = "";
    if (name === "add_creator") {
      const pub = input.pubStatus === "published" ? "published" : "unpublished";
      const rec = {
        id: uid(),
        name: input.name || "",
        handle: input.handle || "",
        phone: input.phone || "",
        superKey: input.superKey || "",
        campaign: input.campaign || "",
        amount: input.amount != null ? Number(input.amount) : "",
        paid: input.paid != null ? Number(input.paid) : "",
        payStatus: input.payStatus || "",
        pubStatus: pub,
        pubLink: pub === "published" ? input.pubLink || "" : "",
        date: todayISO(),
        note: input.note || "",
      };
      upd((d) => {
        d.creators.unshift(rec);
        return d;
      });
      result = `تمت إضافة الكريتور "${rec.name}" بنجاح (id: ${rec.id}).`;
    } else if (name === "update_creator") {
      let found = null;
      upd((d) => {
        const i = d.creators.findIndex((x) => x.id === input.creatorId);
        if (i >= 0) {
          ["name", "handle", "phone", "superKey", "campaign", "note", "payStatus", "pubStatus", "pubLink"].forEach((k) => {
            if (input[k] !== undefined) d.creators[i][k] = input[k];
          });
          ["amount", "paid"].forEach((k) => {
            if (input[k] !== undefined) d.creators[i][k] = Number(input[k]);
          });
          if (d.creators[i].pubStatus === "unpublished") d.creators[i].pubLink = "";
          found = d.creators[i].name;
        }
        return d;
      });
      result = found ? `تم تعديل بيانات "${found}".` : `ما لگيت كريتور بهذا الـid.`;
    } else if (name === "record_payment") {
      let info = null;
      upd((d) => {
        const i = d.creators.findIndex((x) => x.id === input.creatorId);
        if (i >= 0) {
          const cur = Number(d.creators[i].paid) || 0;
          const amt = Number(input.amount) || 0;
          d.creators[i].paid = cur + amt;
          const dt = input.date || todayISO();
          const note = d.creators[i].note || "";
          d.creators[i].note = `${note}${note ? " · " : ""}دفعة ${fmt(amt)} بتاريخ ${dt}`.trim();
          const total = Number(d.creators[i].amount) || 0;
          info = { name: d.creators[i].name, paid: cur + amt, total, rem: total - (cur + amt) };
        }
        return d;
      });
      result = info
        ? `تم تسجيل دفعة ${fmt(input.amount)} لـ "${info.name}". المدفوع صار ${fmt(info.paid)}${info.total ? ` من ${fmt(info.total)} (باقي ${fmt(info.rem)})` : ""}.`
        : `ما لگيت كريتور بهذا الـid.`;
    } else if (name === "delete_creators") {
      const norm = (s) => String(s || "").toLowerCase().trim();
      let matches = [];
      if (input.campaign) {
        const camp = norm(input.campaign);
        matches = data.creators.filter((c) => norm(c.campaign) === camp || norm(c.campaign).includes(camp));
      } else if (Array.isArray(input.names) && input.names.length) {
        const wanted = input.names.map(norm);
        matches = data.creators.filter((c) =>
          wanted.some((w) => w && (norm(c.name).includes(w) || norm(c.handle).includes(w) || w.includes(norm(c.name)) ))
        );
      }
      if (matches.length === 0) {
        result = "ما لگيت أي كريتور يطابق اللي طلبته. تأكد من الاسم أو الرابط.";
      } else if (matches.length > 1 && !input.confirmed) {
        // اطلب تأكيد
        const names = matches.map((c) => `• ${c.name || c.handle || "بدون اسم"}${c.campaign ? " (" + c.campaign + ")" : ""}`).join("\n");

      } else {
        const label = matches.length === 1
          ? `حُذف الكريتور «${matches[0].name || matches[0].handle || "بدون اسم"}»`
          : `حُذف ${matches.length} كريتور` + (input.campaign ? ` من كامبين «${input.campaign}»` : "");
        softDelete("creator", matches, label);
        result = matches.length === 1
          ? `تم حذف «${matches[0].name || matches[0].handle}». تگدر تسترجعه من سلة المحذوفات أو بزر التراجع.`
          : `تم حذف ${matches.length} كريتور. كلهم بسلة المحذوفات إذا تريد ترجعهم.`;
      }
    } else if (name === "add_campaign") {
      const rec = {
        id: uid(),
        name: input.name || "",
        client: input.client || "",
        revenue: input.revenue != null ? Number(input.revenue) : "",
        cost: input.cost != null ? Number(input.cost) : "",
        date: input.date || todayISO(),
        splits: Array.isArray(input.splits)
          ? input.splits.map((s) => ({ name: s.name || "", pct: Number(s.pct) || 0 }))
          : [],
      };
      upd((d) => {
        d.campaigns.unshift(rec);
        return d;
      });
      result = `تمت إضافة كامبين "${rec.name}".`;
    } else if (name === "add_expense") {
      const rec = {
        id: uid(),
        label: input.label || "",
        amount: Number(input.amount) || 0,
        type: input.type === "personal" ? "personal" : "company",
        date: input.date || todayISO(),
        note: input.note || "",
      };
      upd((d) => {
        d.expenses.unshift(rec);
        return d;
      });
      result = `تمت إضافة صرفية "${rec.label}" بمبلغ ${fmt(rec.amount)} (${rec.type === "personal" ? "شخصي" : "شركة"}).`;
    } else {
      result = "أداة غير معروفة.";
    }
    return result;
  };

  const buildContext = () => {
    const creators = data.creators.map((c) => ({
      id: c.id,
      name: c.name,
      handle: c.handle,
      phone: c.phone,
      superKey: c.superKey,
      campaign: c.campaign,
      amount: Number(c.amount) || 0,
      paid: Number(c.paid) || 0,
      remaining: (Number(c.amount) || 0) - (Number(c.paid) || 0),
      published: c.pubStatus === "published",
      pubLink: c.pubLink || "",
      payStatus: c.payStatus || "",
    }));
    const campaigns = data.campaigns.map((c) => ({
      id: c.id,
      name: c.name,
      client: c.client,
      revenue: Number(c.revenue) || 0,
      cost: Number(c.cost) || 0,
      profit: (Number(c.revenue) || 0) - (Number(c.cost) || 0),
      splits: c.splits,
    }));
    const expenses = data.expenses.map((e) => ({
      id: e.id,
      label: e.label,
      amount: Number(e.amount) || 0,
      type: e.type,
      date: e.date,
    }));
    const totalDue = creators.reduce((s, c) => s + c.amount, 0);
    const totalPaid = creators.reduce((s, c) => s + c.paid, 0);
    return {
      today: todayISO(),
      capital: Number(data.capital) || 0,
      creators,
      campaigns,
      expenses,
      summary: { creatorsCount: creators.length, totalDue, totalPaid, totalOutstanding: totalDue - totalPaid },
    };
  };

  const SYSTEM = () => `أنت "المساعد الذكي" داخل تطبيق مالية UGC Iraq (وكالة UGC عراقية). تحجي بالعربي العراقي الودّي ومختصر.

دورك: تساعد المستخدم بكل شي داخل التطبيق عبر المحادثة. عندك أدوات تنفّذ تعديلات حقيقية على البيانات (إضافة/تعديل/حذف كريتور، تسجيل دفعة، إضافة كامبين، إضافة صرفية). لمن المستخدم يطلب شي يحتاج تعديل بيانات، استخدم الأداة المناسبة — لا تكتفي بالكلام.

== الحذف (مهم) ==
لحذف كريتورز استخدم أداة delete_creators — تطابق بالاسم أو الرابط أو الكامبين (مو محتاج id). القواعد:
- لحذف كريتور واحد محدد بالاسم: نفّذ مباشرة.
- لحذف أكثر من واحد أو كامبين كامل: أول مرّر الأسماء/الكامبين بدون confirmed، الأداة راح ترجّعلك قائمة المطابقين — اعرضها للمستخدم واطلب تأكيد صريح، وبعد ما يأكد («أكّد الحذف» أو «إي احذفهم») نفّذ مرة ثانية مع confirmed=true.
- الحذف ناعم: كل المحذوف يروح لسلة المحذوفات ويمكن استرجاعه، فطمّن المستخدم بهذا.

تقدر تقرا سكرين شوت تحويل من تطبيق Super Qi (كي كارد) عراقي. لمن المستخدم يلصق صورة تحويل:
1. اقرا المبلغ ورقم السوبر كي المستلِم من الصورة.

== معالجة شيت كامبين (مهم جداً) ==
لمن يجيك بالرسالة "بيانات الشيت المقروءة تلقائياً بصيغة CSV"، هاي بيانات كامبين كاملة من Google Sheet. سوي التالي بالترتيب:

1. تعرّف على اسم الكامبين: دوّر بأعلى الشيت أو بالعنوان أو من سياق كلام المستخدم. إذا ما واضح، اسأل المستخدم شنو اسم الكامبين.

2. افهم الأعمدة: الشيت عادة فيه أعمدة مثل: الاسم (Name)، الرابط (Link)، التكلفة/السعر (cost)، حالة الاتفاق (Aggrement/Agreement: Approved أو Rejected)، حالة الفيديو (Video Status: Requested/Done)، حالة الدفع (Status: Payed/فاضي). الأعمدة ممكن تكون بالعربي أو الإنكليزي.

3. احسب التكلفة من المعتمدين بس: اجمع cost لكل كريتور حالة اتفاقه = Approved فقط. تجاهل أي صف حالته Rejected تماماً — لا تحسبه ولا تضيفه. لاحظ التكلفة ممكن تكون بالدولار ($) أو الدينار — انتبه للعملة وبيّنها.

4. سوي الثنين معاً:
   أ) أضف صرفية إجمالية للكامبين باستخدام add_expense: label = "تكلفة كامبين [الاسم] - [عدد] كريتور معتمد"، amount = مجموع تكاليف المعتمدين، type = "company". هاي تمثّل المبلغ اللي المفروض تصرفه بالفترة الجاية.
   ب) أضف كل كريتور معتمد كصف منفصل باستخدام add_creator: name من الشيت، handle = الرابط، amount = سعره، campaign = اسم الكامبين، وحالة الدفع: إذا الشيت يبيّن Payed خلي payStatus="paid" و paid = amount، وإلا payStatus="unpaid". إذا حالة الفيديو Done خلي pubStatus="published".

5. بعد ما تخلص، اعطِ المستخدم ملخّص: اسم الكامبين، عدد المعتمدين، عدد المرفوضين (المتجاهَلين)، والتكلفة الكلية.

ملاحظة: لا تضيف الكريتورز المرفوضين أبداً. إذا نفس الكريتور موجود من قبل بالقائمة (نفس الاسم)، لا تكرره — بس نبّه المستخدم.

تحديث الدفع لاحقاً: المستخدم راح يحدّث الشيت بنفسه ويعطي Payed، وبعدين ممكن يعيد إرسال الرابط أو يگلك "حدّث دفعات كامبين [الاسم]" — وقتها قارن وحدّث حالات الدفع.`;

  // ---- قراءة Google Sheets المنشور ---------------------------------------
  // يستخرج معرّف الشيت و gid من أي رابط، ويبني رابط CSV قابل للقراءة من المتصفح
  // يرجّع قائمة روابط CSV مرشّحة نجرّبها بالترتيب (لأن بعض الصيغ تنحجب بالـCORS)
  const parseSheetUrls = (url) => {
    const candidates = [];
    try {
      const gidM = url.match(/[#&?]gid=([0-9]+)/);
      const gid = gidM ? gidM[1] : null;

      // صيغة النشر للعامة: /spreadsheets/d/e/2PACX-.../pubhtml أو /pub
      const pm = url.match(/\/spreadsheets\/d\/e\/([a-zA-Z0-9-_]+)/);
      if (pm && pm[1]) {
        const id = pm[1];
        candidates.push(`https://docs.google.com/spreadsheets/d/e/${id}/pub?output=csv${gid ? `&gid=${gid}` : ""}`);
        candidates.push(`https://docs.google.com/spreadsheets/d/e/${id}/pub?single=true&output=csv${gid ? `&gid=${gid}` : ""}`);
        return candidates;
      }

      // الصيغة العادية: /spreadsheets/d/SHEET_ID/edit#gid=GID
      const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (m && m[1]) {
        const id = m[1];
        candidates.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv${gid ? `&gid=${gid}` : ""}`);
        candidates.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv${gid ? `&gid=${gid}` : ""}`);
        return candidates;
      }
    } catch (e) {}
    return candidates;
  };

  const detectSheetUrl = (txt) => {
    const m = txt.match(/https?:\/\/docs\.google\.com\/spreadsheets\/[^\s]+/);
    return m ? m[0] : null;
  };

  // يجرّب كل رابط مرشّح لحد ما يلگي CSV صحيح (قراءة مباشرة من المتصفح)
  const fetchSheetCsv = async (urls) => {
    let lastErr = "fetch_failed";
    for (const u of urls) {
      try {
        const resp = await fetch(u);
        if (!resp.ok) {
          lastErr = "fetch_failed";
          continue;
        }
        const text = await resp.text();
        // إذا رجع HTML بدل CSV معناها الشيت مو منشور أو الصيغة غلط
        if (text.trim().startsWith("<") || text.includes("<!DOCTYPE") || text.includes("<html")) {
          lastErr = "not_published";
          continue;
        }
        if (text.trim().length === 0) {
          lastErr = "fetch_failed";
          continue;
        }
        return text; // نجح
      } catch (e) {
        lastErr = "fetch_failed";
      }
    }
    throw new Error(lastErr);
  };

  // قراءة الشيت عبر الخادم الوسيط (يتجاوز حجب CORS تماماً)
  // طلب مع مهلة زمنية (timeout) — يتجنب التعليق للأبد
  const fetchWithTimeout = async (url, ms) => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try {
      const resp = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      return resp;
    } catch (e) {
      clearTimeout(t);
      throw e;
    }
  };

  const fetchViaServer = async (serverUrl, sheetUrl, onWake) => {
    const base = serverUrl.replace(/\/+$/, ""); // شيل أي / زايدة بالنهاية
    const endpoint = `${base}/sheet?url=${encodeURIComponent(sheetUrl)}`;

    // الخادم المجاني ممكن يكون نايم — نجرّب عدة مرات وننتظر بينها (cold start)
    let lastErr = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const resp = await fetchWithTimeout(endpoint, 60000); // مهلة دقيقة (الخادم يصحى)
        const text = await resp.text();
        if (!resp.ok) {
          try {
            const j = JSON.parse(text);
            throw new Error(j.error || "fetch_failed");
          } catch (e) {
            throw new Error(e.message || "fetch_failed");
          }
        }
        if (text.trim().startsWith("<") || text.includes("<html") || text.trim().length === 0) {
          throw new Error("not_published");
        }
        return text; // نجح
      } catch (e) {
        lastErr = e;
        // أخطاء واضحة ما نعيدها
        if (e.message === "not_published" || e.message === "bad_url") throw e;
        // خطأ شبكة أو timeout — يمكن الخادم نايم، ننتظر ونعيد
        if (attempt === 0 && onWake) onWake();
        await new Promise((r) => setTimeout(r, 4000));
      }
    }
    throw lastErr || new Error("fetch_failed");
  };

      // إذا ماكو خادم أو فشل، جرّب القراءة المباشرة من المتصفح
      if (!sheetCsv) {

    if (sheetUrl && sheetError) {

          : sheetError === "bad_url"

          : "ما گدرت أوصل للشيت — Google حجب القراءة المباشرة من المتصفح. للقراءة التلقائية، اضبط رابط الخادم الوسيط من تبويب «إعدادات». أو مؤقتاً: صدّر الشيت CSV وارفعه بزر 📎.";
      addMsg({ role: "ai", type: "text", text: msg });
      setTextInput("");
      setBusy(false);
      return;
    }

    // بيانات CSV من ملف مرفوع تُعامل مثل بيانات شيت
    const csvData = sheetCsv || (pendingCsv ? pendingCsv.text : null);

    const content = [];
    if (pendingImg)
      content.push({
        type: "image",
        source: { type: "base64", media_type: pendingImg.mediaType, data: pendingImg.b64 },
      });
    let userText = txt || (pendingImg ? "اقرا هالصورة وسجّل الدفعة إذا تعرفت على الكريتور." : "اقرا بيانات هالشيت وعالج الكامبين.");
    if (csvData) {
      userText += `\n\n[بيانات الشيت بصيغة CSV — اقرأها وتعرّف على الكامبين واحسب التكلفة من المعتمدين بس]:\n${csvData}`;
    }

    // سجل المحادثة السابق + رسالة المستخدم الجديدة (نمرّره لـ runConversation)
    const seedHistory = [...(activeConv ? activeConv.apiHistory : []), { role: "user", content }];
    pushApi({ role: "user", content });
    // عنونة المحادثة تلقائياً من أول رسالة للمستخدم
    if (txt && activeConv && (activeConv.title === "محادثة جديدة" || !activeConv.title)) {

      // إذا عالجنا شيت من رابط بنجاح، ذكّر المستخدم يسكّر النشر (مو للملف المرفوع)
      if (sheetCsv && sheetUrl) {
        setPublishReminder({ url: sheetUrl });
      }
    } catch (e) {
      addMsg({ role: "ai", type: "text", text: "صار خطأ بالاتصال. تأكد من الانترنت وجرّب مرة ثانية." });
    }
    setBusy(false);
  };

  const runConversation = async (seedHistory) => {
    // نحسب عنوان الخادم: serverUrl إذا مضبوط، وإلا نفس الموقع (التطبيق منشور مع الخادم)
    let apiBase = (data.serverUrl || "").trim().replace(/\/+$/, "");
    if (!apiBase && typeof window !== "undefined" && window.location && window.location.origin.startsWith("http")) {
      apiBase = window.location.origin;
    }
    const claudeEndpoint = apiBase ? `${apiBase}/claude` : "/claude";
    const modelToUse = (activeConv && activeConv.model) || data.defaultModel || "claude-sonnet-4-6";

    // نسخة عمل محلية من سجل المحادثة (تبدي بالسجل السابق + رسالة المستخدم الجديدة)
    let history = seedHistory.slice();

    let guard = 0;
    while (guard++ < 10) {
      const resp = await fetch(claudeEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: modelToUse,
          max_tokens: 4000,
          system: SYSTEM(),
          tools,
          messages: history,
        }),
      });
      const json = await resp.json();
      if (json.type === "error" || json.error || !json.content) {
        const errDetail = json.error ? (typeof json.error === "string" ? json.error : (json.error.message || json.error.type || "")) : "";
        addMsg({
          role: "ai",
          type: "text",
          text: errDetail === "no_api_key"
            ? "الخادم ما عنده مفتاح API. تأكد إنك ضفت ANTHROPIC_API_KEY بإعدادات Render (Environment)."
            : "ما گدرت أكمّل الطلب. " + (errDetail ? "(" + errDetail + ") " : "") + "جرّب مرة ثانية.",
        });
        // احفظ السجل لحد هنا
        patchActive((conv) => { conv.apiHistory = history; });
        return;
      }

      const textBlocks = json.content.filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      if (textBlocks) addMsg({ role: "ai", type: "text", text: textBlocks });

      history.push({ role: "assistant", content: json.content });

      const toolUses = json.content.filter((b) => b.type === "tool_use");
      if (toolUses.length === 0) {
        patchActive((conv) => { conv.apiHistory = history; });
        return;
      }

      const toolResults = [];
      for (const tu of toolUses) {
        const out = runTool(tu.name, tu.input || {});
        addMsg({ role: "ai", type: "action", tool: tu.name, text: out });
        toolResults.push({ type: "tool_result", tool_use_id: tu.id, content: out });
      }
      history.push({ role: "user", content: toolResults });
    }
    // وصلنا للحد الأقصى — احفظ السجل
    patchActive((conv) => { conv.apiHistory = history; });
  };

                      </div>
                      <div style={{ fontSize: 11, color: "#A8A6A0" }}>

          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>

        ) : (
          <div style={S.userBubble}>{m.text}</div>

    return (
      <div style={S.aiRow}>
        <div style={S.aiAvatar}>🤖</div>
        <div style={S.actionCard}>
          <span style={S.actionDot}>✓</span>

    </div>
  );
}

// ============================================================================
// تبويب سلة المحذوفات — استرجاع أو حذف نهائي
// ============================================================================
function TrashTab({ data, restoreFromTrash, purgeFromTrash, emptyTrash }) {
  const trash = data.trash || [];
  const kindLabel = (k) =>
    k === "creator" ? "كريتور (مدفوعات)" : k === "creatorDB" ? "كريتور (قاعدة)" : k === "campaign" ? "كامبين" : k === "expense" ? "صرفية" : k;
  const itemName = (t) => {
    const it = t.item || {};
    if (t.kind === "campaign") return it.name || "بدون اسم";
    if (t.kind === "expense") return it.label || "بدون بيان";
    return it.name || it.handle || "بدون اسم";
  };
  const itemDetail = (t) => {
    const it = t.item || {};
    if (t.kind === "creator") return `${it.campaign ? "كامبين " + it.campaign + " · " : ""}${fmt(it.amount)}`;
    if (t.kind === "creatorDB") return it.followers ? Number(it.followers).toLocaleString("en-US") + " متابع" : "";
    if (t.kind === "campaign") return it.revenue ? "إيراد " + fmt(it.revenue) : "";
    if (t.kind === "expense") return fmt(it.amount);
    return "";
  };
  const timeAgo = (ts) => {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return "الحين";
    if (min < 60) return `قبل ${min} دقيقة`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `قبل ${hr} ساعة`;
    const day = Math.floor(hr / 24);
    return `قبل ${day} يوم`;
  };

  return (
    <div>
      <div style={S.tabHead}>
        <SectionTitle noMargin>سلة المحذوفات</SectionTitle>
        {trash.length > 0 && (
          <button style={S.dangerBtn} onClick={() => { if (window.confirm("تفرّغ السلة نهائياً؟ ما راح تگدر تسترجع بعدها.")) emptyTrash(); }}>
            🗑️ فرّغ السلة نهائياً
          </button>
        )}
      </div>

      <p style={{ fontSize: 13.5, color: "#888780", margin: "0 0 18px", lineHeight: 1.7 }}>
        أي شي تحذفه من التطبيق يجي هنا. تگدر تسترجعه لمكانه الأصلي، أو تحذفه نهائياً. (الحذف النهائي ما له رجعة).
      </p>

      {trash.length === 0 ? (
        <div style={S.emptyState}>السلة فارغة — ماكو شي محذوف.</div>
      ) : (
        <div style={S.tableWrap}>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>النوع</th>
                <th style={S.th}>الاسم</th>
                <th style={S.th}>تفاصيل</th>
                <th style={S.th}>وقت الحذف</th>
                <th style={{ ...S.th, width: 200 }}></th>
              </tr>
            </thead>
            <tbody>
              {trash.map((t) => (
                <tr key={t.trashId} style={S.tr}>
                  <td style={S.td}><span style={S.trashKindPill}>{kindLabel(t.kind)}</span></td>
                  <td style={S.td}><div style={S.cName}>{itemName(t)}</div></td>
                  <td style={S.tdMuted}>{itemDetail(t)}</td>
                  <td style={S.tdMuted}>{timeAgo(t.deletedAt)}</td>
                  <td style={S.td}>
                    <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                      <button style={S.restoreBtn} onClick={() => restoreFromTrash(t.trashId)}>↩ استرجاع</button>
                      <button style={S.iconBtnDanger} onClick={() => { if (window.confirm("حذف نهائي؟ ما له رجعة.")) purgeFromTrash(t.trashId); }} title="حذف نهائي">✕</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ============================================================================
// لوحة المزامنة السحابية (Firebase) — تخلّي الداتا أونلاين مشتركة بين كل الأجهزة
// ============================================================================
function FirebasePanel({ data, setData }) {
  const [url, setUrl] = useState(getFirebaseURL());
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState(false);
  const connected = !!getFirebaseURL();

  const testAndSave = async () => {
    const clean = (url || "").trim().replace(/\/+$/, "");
    if (!clean) { setStatus("✕ اكتب رابط قاعدة Firebase أول"); return; }
    if (!/^https:\/\//.test(clean)) {
      setStatus("✕ الرابط لازم يبدي بـ https://");
      return;
    }
    setBusy(true);
    setStatus("... أفحص الاتصال بقاعدة Firebase");
    try {
      // جرّب كتابة اختبار
      const testResp = await fetch(`${clean}/_connectionTest.json`, {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ t: Date.now() }),
      });
      if (!testResp.ok) {
        setStatus(`✕ ما گدرت أكتب للقاعدة (${testResp.status}). تأكد إن قواعد القراءة/الكتابة مفتوحة بـ Firebase.`);
        setBusy(false);
        return;
      }
      setFirebaseURL(clean);
      setStatus("✓ تم الربط بنجاح! الداتا صارت أونلاين مشتركة.");
    } catch (e) {
      setStatus("✕ ما گدرت أوصل للقاعدة. تأكد من الرابط واتصال الإنترنت.");
    }
    setBusy(false);
  };

  // ارفع الداتا الحالية للسحابة (أول مرة)
  const pushToCloud = async () => {
    if (!getFirebaseURL()) { setStatus("✕ اربط القاعدة أول"); return; }
    if (!window.confirm("راح ترفع كل بياناتك الحالية للسحابة. هذي تصير النسخة المشتركة لكل الموظفين. متأكد؟")) return;
    setBusy(true);
    setStatus("... أرفع الداتا للسحابة");
    const ok = await saveAll(data);
    setStatus(ok ? "✓ انرفعت الداتا للسحابة! الحين كل الموظفين يشوفونها." : "✕ فشل الرفع، جرّب مرة ثانية");
    setBusy(false);
  };

  // اسحب الداتا من السحابة (لو تريد تستبدل المحلية بالسحابية)
  const pullFromCloud = async () => {
    if (!getFirebaseURL()) { setStatus("✕ اربط القاعدة أول"); return; }
    if (!window.confirm("راح تسحب الداتا من السحابة وتستبدل اللي عندك محلياً. متأكد؟")) return;
    setBusy(true);
    setStatus("... أسحب الداتا من السحابة");
    try {
      const resp = await fetch(`${getFirebaseURL()}/ugcData.json`);
      const remote = await resp.json();
      if (remote && typeof remote === "object") {
        setData({ ...EMPTY, ...remote });
        setStatus("✓ انسحبت الداتا من السحابة!");
      } else {
        setStatus("✕ ماكو داتا بالسحابة بعد. ارفع داتاك أول بزر «ارفع للسحابة».");
      }
    } catch (e) {
      setStatus("✕ فشل السحب، جرّب مرة ثانية");
    }
    setBusy(false);
  };

  const disconnect = () => {
    if (!window.confirm("راح تفصل المزامنة السحابية. الداتا تبقى محفوظة محلياً بس ما تتزامن مع الموظفين. متأكد؟")) return;
    setFirebaseURL("");
    setUrl("");
    setStatus("✓ انفصلت المزامنة. الداتا محلية الحين.");
  };

  return (
    <div style={{ ...S.panel, border: connected ? "2px solid #0F9E8E" : "1px solid #EBE9E1", background: connected ? "#F2FBF9" : "#fff" }}>
      <div style={S.panelTitle}>
        ☁️ المزامنة السحابية {connected ? <span style={{ fontSize: 12, background: "#0F9E8E", color: "#fff", padding: "3px 10px", borderRadius: 20, marginRight: 8 }}>● متصل</span> : <span style={{ fontSize: 12, background: "#E8E6DE", color: "#888", padding: "3px 10px", borderRadius: 20, marginRight: 8 }}>غير متصل</span>}
      </div>
      <p style={S.settingHint}>
        تربط التطبيق بقاعدة Firebase مجانية، فالداتا تصير <b>أونلاين مشتركة</b> — أي تعديل تسويه يطلع لكل الموظفين لحظياً، وكلكم تشوفون نفس الكريتورز والكامبينات والتاسكات.
      </p>

      <label style={S.fieldLabel}>رابط قاعدة Firebase (Realtime Database URL)</label>
      <input
        style={{ ...S.input, direction: "ltr", textAlign: "left", marginBottom: 8 }}
        value={url}
        onChange={(e) => setUrl(e.target.value)}
        placeholder="https://your-project-default-rtdb.firebaseio.com"
      />
      {status && <div style={{ fontSize: 13, fontWeight: 700, color: status.startsWith("✓") ? "#0F6E56" : status.startsWith("...") ? "#888" : "#A32D2D", margin: "8px 0", lineHeight: 1.5 }}>{status}</div>}

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
        <button style={S.primaryBtn} onClick={testAndSave} disabled={busy}>🔗 اربط واحفظ</button>
        {connected && <button style={S.secondaryBtn} onClick={pushToCloud} disabled={busy}>⬆ ارفع داتاي للسحابة</button>}
        {connected && <button style={S.ghostBtn} onClick={pullFromCloud} disabled={busy}>⬇ اسحب من السحابة</button>}
        {connected && <button style={{ ...S.ghostBtn, color: "#A32D2D" }} onClick={disconnect} disabled={busy}>✕ افصل</button>}
      </div>

      {!connected && (
        <details style={{ marginTop: 14, fontSize: 13, color: "#555" }}>
          <summary style={{ cursor: "pointer", fontWeight: 700, color: "#0A4A42" }}>📖 شلون أسوي قاعدة Firebase مجانية؟ (خطوات)</summary>
          <ol style={{ lineHeight: 1.9, paddingRight: 18, marginTop: 8 }}>
            <li>روح <b>console.firebase.google.com</b> وسجّل دخول بحساب Google</li>
            <li>اضغط «Add project» وسمّي المشروع (مثلاً ugc-iraq)</li>
            <li>من القائمة اليسار: <b>Build ← Realtime Database ← Create Database</b></li>
            <li>اختر «Start in test mode» (للتجربة) ← Enable</li>
            <li>انسخ الرابط اللي يطلع فوق (يشبه: https://ugc-iraq-default-rtdb.firebaseio.com)</li>
            <li>الصقه هنا فوق واضغط «اربط واحفظ»</li>
            <li>بعدها اضغط «ارفع داتاي للسحابة» مرة وحدة</li>
          </ol>
          <p style={{ color: "#A86A00", background: "#FFF8EC", padding: 10, borderRadius: 8 }}>⚠️ «test mode» تنتهي بعد 30 يوم. لاحقاً نضبط قواعد آمنة. للحين كافية حتى تجرّب.</p>
        </details>
      )}
    </div>
  );
}

// ============================================================================
// لوحة إدارة الموظفين (للأدمن فقط) — تعديل الأسماء، الرموز، الرتب، الكامبينات، والتاسكات
// ============================================================================
function StaffManager({ data, upd, staffList }) {
  const [editId, setEditId] = useState(null); // user الجاري تعديله
  const [form, setForm] = useState(null);
  const [msg, setMsg] = useState("");
  const [taskFor, setTaskFor] = useState(null); // موظف نضيفله تاسك
  const [taskText, setTaskText] = useState("");
  const [taskCamp, setTaskCamp] = useState("");

  // كل أسماء الكامبينات الموجودة (للاختيار)
  const allCampaigns = [...new Set((data.creators || []).map((c) => c.campaign).filter(Boolean))].sort();

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 4000); };

  // احفظ قائمة الموظفين بالبيانات
  const saveStaff = (newList) => upd((d) => { d.staff = newList; return d; });

  const startEdit = (s) => {
    setEditId(s.user);
    setForm({ ...s, campaigns: [...(s.campaigns || [])] });
  };
  const startNew = () => {
    setEditId("__new__");
    setForm({ user: "", name: "", code: "", role: "staff", campaigns: [] });
  };
  const cancelEdit = () => { setEditId(null); setForm(null); };

  const saveEdit = () => {
    if (!form.name.trim()) { flash("✕ اكتب اسم الموظف"); return; }
    if (!form.user.trim()) { flash("✕ اكتب اليوزر (انجليزي)"); return; }
    if (!form.code.trim()) { flash("✕ اكتب رمز الدخول"); return; }
    const cur = (data.staff && data.staff.length) ? data.staff : staffList;
    // تأكد ماكو يوزر أو رمز مكرر
    const dupe = cur.find((s) => s.user !== editId && (s.user.toLowerCase() === form.user.toLowerCase().trim() || s.code.toLowerCase() === form.code.toLowerCase().trim()));
    if (dupe) { flash("✕ اليوزر أو الرمز مستخدم من موظف ثاني"); return; }
    const clean = { user: form.user.toLowerCase().trim(), name: form.name.trim(), code: form.code.trim(), role: form.role || "staff", campaigns: form.campaigns || [] };
    let newList;
    if (editId === "__new__") {
      newList = [...cur, clean];
    } else {
      newList = cur.map((s) => (s.user === editId ? clean : s));
      // لو تغيّر اليوزر، حدّث التاسكات المرتبطة
      if (editId !== clean.user) {
        upd((d) => { (d.tasks || []).forEach((t) => { if (t.user === editId) t.user = clean.user; }); return d; });
      }
    }
    saveStaff(newList);
    flash("✓ انحفظ");
    cancelEdit();
  };

  const delStaff = (s) => {
    if (!window.confirm(`متأكد تريد حذف الموظف «${s.name}»؟ تاسكاته راح تنحذف هم.`)) return;
    const cur = (data.staff && data.staff.length) ? data.staff : staffList;
    saveStaff(cur.filter((x) => x.user !== s.user));
    upd((d) => { d.tasks = (d.tasks || []).filter((t) => t.user !== s.user); return d; });
    flash("✓ انحذف الموظف");
  };

  const toggleRole = (s) => {
    const cur = (data.staff && data.staff.length) ? data.staff : staffList;
    const newRole = s.role === "admin" ? "staff" : "admin";
    if (newRole === "admin" && !window.confirm(`ترفع «${s.name}» لرتبة أدمن؟ راح يتحكم بكلشي — الأرباح، الصرفيات، الإعدادات، وكل البيانات.`)) return;
    saveStaff(cur.map((x) => (x.user === s.user ? { ...x, role: newRole } : x)));
    flash(newRole === "admin" ? `✓ «${s.name}» صار أدمن` : `✓ «${s.name}» رجع موظف عادي`);
  };

  const toggleCampaign = (cn) => {
    setForm((f) => {
      const has = (f.campaigns || []).includes(cn);
      return { ...f, campaigns: has ? f.campaigns.filter((c) => c !== cn) : [...(f.campaigns || []), cn] };
    });
  };

  // أضف تاسك لموظف (من الإدارة)
  const addTaskToStaff = () => {
    if (!taskText.trim()) { flash("✕ اكتب التاسك"); return; }
    upd((d) => {
      d.tasks = d.tasks || [];
      d.tasks.unshift({ id: "t" + Date.now(), user: taskFor.user, text: taskText.trim(), campaign: taskCamp, done: false, at: Date.now(), by: "admin" });
      return d;
    });
    flash(`✓ انضاف تاسك لـ«${taskFor.name}»`);
    setTaskText(""); setTaskCamp("");
  };

  const list = (data.staff && data.staff.length) ? data.staff : staffList;

  return (
    <div style={S.panel}>
      <div style={S.panelTitle}>👥 إدارة الموظفين</div>
      <p style={S.settingHint}>عدّل أسماء الموظفين ورموزهم، ارفع رتبة موظف لأدمن (يتحكم بكلشي) أو خلّيه موظف عادي (يشوف الكريتورز والتاسكات بس)، خصّص كامبينات، وأضفلهم تاسكات.</p>
      {msg && <div style={{ fontSize: 13, fontWeight: 700, color: msg.startsWith("✓") ? "#0F6E56" : "#A32D2D", marginBottom: 10 }}>{msg}</div>}

      {/* قائمة الموظفين */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 8 }}>
        {list.map((s) => (
          <div key={s.user} style={{ border: "1px solid #EBE9E1", borderRadius: 12, padding: 14, background: s.role === "admin" ? "#FBF7EE" : "#fff" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 180 }}>
                <div style={{ fontWeight: 800, color: "#0A4A42", fontSize: 15 }}>
                  {s.name}
                  {s.role === "admin" && <span style={{ marginRight: 8, fontSize: 11, background: "#FFE7BA", color: "#A86A00", padding: "2px 10px", borderRadius: 20, fontWeight: 700 }}>👑 أدمن</span>}
                </div>
                <div style={{ fontSize: 12.5, color: "#888780", marginTop: 3, direction: "ltr", textAlign: "right" }}>
                  user: <b>{s.user}</b> · رمز: <b>{s.code}</b>
                </div>
                {(s.campaigns || []).length > 0 && (
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginTop: 6 }}>
                    {s.campaigns.map((c) => <span key={c} style={{ fontSize: 11, background: "#E1F5F2", color: "#0A4A42", padding: "2px 8px", borderRadius: 20 }}>{c}</span>)}
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <button style={S.miniBtn} onClick={() => { setTaskFor(s); setTaskCamp((s.campaigns || [])[0] || ""); }}>✅ تاسك</button>
                <button style={S.miniBtn} onClick={() => startEdit(s)}>✎ تعديل</button>
                <button style={{ ...S.miniBtn, color: s.role === "admin" ? "#A86A00" : "#0F6E56" }} onClick={() => toggleRole(s)}>
                  {s.role === "admin" ? "↓ موظف" : "↑ أدمن"}
                </button>
                <button style={{ ...S.miniBtn, color: "#A32D2D" }} onClick={() => delStaff(s)}>✕</button>
              </div>
            </div>

            {/* نموذج إضافة تاسك لهذا الموظف */}
            {taskFor && taskFor.user === s.user && (
              <div style={{ marginTop: 12, padding: 12, background: "#F2FBF9", borderRadius: 10, border: "1px solid #D6F0EA" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#0A4A42", marginBottom: 8 }}>أضف تاسك لـ«{s.name}»</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <input style={{ ...S.input, flex: 1, minWidth: 180 }} value={taskText} onChange={(e) => setTaskText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addTaskToStaff()} placeholder="اكتب التاسك..." autoFocus />
                  <select style={{ ...S.input, maxWidth: 170 }} value={taskCamp} onChange={(e) => setTaskCamp(e.target.value)}>
                    <option value="">بدون كامبين</option>
                    {(s.campaigns || []).map((c) => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <button style={S.primaryBtn} onClick={addTaskToStaff}>+ أضف</button>
                  <button style={S.ghostBtn} onClick={() => { setTaskFor(null); setTaskText(""); }}>إلغاء</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* زر إضافة موظف */}
      {editId === null && (
        <button style={{ ...S.secondaryBtn, marginTop: 14 }} onClick={startNew}>+ أضف موظف جديد</button>
      )}

      {/* نموذج التعديل/الإضافة */}
      {form && (
        <div style={{ marginTop: 14, padding: 16, background: "#F7FBFA", borderRadius: 12, border: "1px solid #D8EFE9" }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: "#0A4A42", marginBottom: 12 }}>{editId === "__new__" ? "موظف جديد" : "تعديل موظف"}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10, marginBottom: 12 }}>
            <div>
              <label style={S.fieldLabel}>الاسم</label>
              <input style={S.input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="مثلاً: شهد ليث" />
            </div>
            <div>
              <label style={S.fieldLabel}>اليوزر (انجليزي)</label>
              <input style={{ ...S.input, direction: "ltr", textAlign: "left" }} value={form.user} onChange={(e) => setForm({ ...form, user: e.target.value })} placeholder="shahad" />
            </div>
            <div>
              <label style={S.fieldLabel}>رمز الدخول</label>
              <input style={{ ...S.input, direction: "ltr", textAlign: "left" }} value={form.code} onChange={(e) => setForm({ ...form, code: e.target.value })} placeholder="SH1422" />
            </div>
            <div>
              <label style={S.fieldLabel}>الرتبة</label>
              <select style={S.input} value={form.role} onChange={(e) => setForm({ ...form, role: e.target.value })}>
                <option value="staff">موظف (تاسكات وكريتورز بس)</option>
                <option value="admin">أدمن (تحكم كامل)</option>
              </select>
            </div>
          </div>
          <label style={S.fieldLabel}>الكامبينات المخصصة ({(form.campaigns || []).length})</label>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", maxHeight: 160, overflowY: "auto", padding: 10, background: "#fff", border: "1px solid #E5E3DA", borderRadius: 10, marginTop: 4, marginBottom: 12 }}>
            {allCampaigns.length === 0 ? <span style={{ fontSize: 12.5, color: "#A8A6A0" }}>ماكو كامبينات بعد</span> : allCampaigns.map((cn) => {
              const sel = (form.campaigns || []).includes(cn);
              return (
                <button key={cn} onClick={() => toggleCampaign(cn)} style={{ fontSize: 12, padding: "4px 10px", borderRadius: 20, cursor: "pointer", border: sel ? "1px solid #0F9E8E" : "1px solid #D3D1C7", background: sel ? "#0F9E8E" : "#fff", color: sel ? "#fff" : "#555", fontWeight: sel ? 700 : 400 }}>
                  {sel ? "✓ " : ""}{cn}
                </button>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button style={S.primaryBtn} onClick={saveEdit}>💾 احفظ</button>
            <button style={S.ghostBtn} onClick={cancelEdit}>إلغاء</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================================
// تبويب الإعدادات
// ============================================================================
function SettingsTab({ data, setData, upd, staffList }) {
  const [cap, setCap] = useState(data.capital || 0);
  const [srv, setSrv] = useState(data.serverUrl || "");
  const [srvTest, setSrvTest] = useState(""); // نتيجة فحص الخادم
  const [msg, setMsg] = useState("");

  const testServer = async () => {
    const base = (srv || "").trim().replace(/\/+$/, "");
    if (!base) {
      setSrvTest("✕ اكتب رابط الخادم أول");
      return;
    }
    if (!/^https:\/\//.test(base)) {
      setSrvTest("✕ الرابط لازم يبدي بـ https://");
      return;
    }
    setSrvTest("... أفحص الخادم (ممكن ياخذ نص دقيقة إذا نايم)");
    // نجرّب عدة مرات لأن الخادم المجاني ممكن يكون نايم
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 60000);
        const resp = await fetch(`${base}/health`, { signal: ctrl.signal });
        clearTimeout(t);
        const j = await resp.json();
        if (j && j.ok) {
          setSrvTest("✓ الخادم شغّال وجاهز");
          return;
        }
        setSrvTest("✕ الخادم رد بشكل غير متوقع");
        return;
      } catch (e) {
        if (attempt === 0) setSrvTest("... الخادم يصحى من النوم، انتظر شوية");
        await new Promise((r) => setTimeout(r, 4000));
      }
    }
    setSrvTest("✕ ما گدرت أوصل للخادم. تأكد إنه Live بـ Render، وإن الرابط صحيح كامل.");
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ugc-finance-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // وضع الاستيراد: "merge" يدمج ويتجاهل التكرار (الافتراضي)، "replace" يستبدل كلش
  const [importMode, setImportMode] = useState("merge");

  const unameKey = (h) => {
    const m = String(h || "").match(/instagram\.com\/([\w._]+)/i) || String(h || "").match(/tiktok\.com\/@([\w._]+)/i);
    return m ? m[1].toLowerCase() : "";
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);

        // وضع الاستبدال الكامل (القديم)
        if (importMode === "replace") {
          setData({ ...EMPTY, ...parsed });
          setCap(parsed.capital || 0);
          setSrv(parsed.serverUrl || "");
          setMsg("✓ تم استبدال كل البيانات بالملف");
          setTimeout(() => setMsg(""), 4000);
          return;
        }

        // وضع الدمج: يدمج القاعدة والمدفوعات بدون تكرار
        setData((d) => {
          const out = { ...d };

          // --- 1) دمج قاعدة الكريتورز (creatorsDB) بدون تكرار ---
          const inDB = Array.isArray(parsed.creatorsDB) ? parsed.creatorsDB : [];
          const existingDB = (d.creatorsDB || []).slice();
          const dbByKey = {};
          existingDB.forEach((c) => {
            const k = unameKey(c.handle) || ("name:" + (c.name || "").toLowerCase().trim());
            if (k && k !== "name:") dbByKey[k] = c;
          });
          let dbAdded = 0, dbMerged = 0;
          inDB.forEach((it) => {
            const handle = it.handle || it.link || "";
            const name = it.name || "";
            const k = unameKey(handle) || ("name:" + name.toLowerCase().trim());
            if (!k || k === "name:") return;
            if (dbByKey[k]) {
              const ex = dbByKey[k];
              if ((!ex.followers || ex.followers === 0) && it.followers) ex.followers = Number(it.followers) || 0;
              if (!ex.lastPrice && it.lastPrice) ex.lastPrice = it.lastPrice;
              if (!ex.phone && it.phone) ex.phone = it.phone;
              if (!ex.province && it.province) ex.province = it.province;
              if (!ex.note && it.note) ex.note = it.note;
              dbMerged++;
            } else {
              const rec = { id: "d" + Date.now() + Math.random().toString(36).slice(2, 7), name, handle, phone: it.phone || "", followers: Number(it.followers) || 0, lastPrice: it.lastPrice || "", province: it.province || "", note: it.note || "" };
              existingDB.push(rec);
              dbByKey[k] = rec;
              dbAdded++;
            }
          });
          out.creatorsDB = existingDB;

          // --- 2) دمج المدفوعات (creators) بدون تكرار: المفتاح = حساب + كامبين ---
          const inCr = Array.isArray(parsed.creators) ? parsed.creators : [];
          const existingCr = (d.creators || []).slice();
          const crSeen = new Set(existingCr.map((c) => (unameKey(c.handle) || (c.name || "").toLowerCase().trim()) + "|" + (c.campaign || "").toLowerCase().trim()));
          let crAdded = 0;
          inCr.forEach((it) => {
            const key = (unameKey(it.handle) || (it.name || "").toLowerCase().trim()) + "|" + (it.campaign || "").toLowerCase().trim();
            if (it.handle && crSeen.has(key)) return;
            crSeen.add(key);
            existingCr.push({ ...it, id: it.id || ("c" + Date.now() + Math.random().toString(36).slice(2, 7)) });
            crAdded++;
          });
          out.creators = existingCr;

          // --- 3) دمج الكامبينات والبلاك ليست والمصاريف بدون تكرار ---
          const mergeList = (exArr, inArr, keyFn) => {
            const res = (exArr || []).slice();
            const seen = new Set(res.map(keyFn));
            let added = 0;
            (inArr || []).forEach((x) => { const k = keyFn(x); if (!seen.has(k)) { seen.add(k); res.push(x); added++; } });
            return { res, added };
          };
          const campRes = mergeList(d.campaigns, parsed.campaigns, (c) => (c.name || "").toLowerCase().trim());
          out.campaigns = campRes.res;
          out.blacklist = mergeList(d.blacklist, parsed.blacklist, (b) => (unameKey(b.handle) || (b.name || "").toLowerCase().trim())).res;
          out.expenses = mergeList(d.expenses, parsed.expenses, (x) => (x.id || "") + (x.note || "") + (x.amount || "")).res;
          if (parsed.capital && !d.capital) { out.capital = parsed.capital; setCap(parsed.capital); }

          window.setTimeout(() => {
            const parts = [];
            if (dbAdded) parts.push(`${dbAdded} كريتور جديد`);
            if (dbMerged) parts.push(`كمّلت نواقص ${dbMerged}`);
            if (crAdded) parts.push(`${crAdded} سجل دفعة`);
            if (campRes.added) parts.push(`${campRes.added} كامبين`);
            setMsg(`✓ استيراد شامل تم — ${parts.join(" · ") || "ماكو جديد، كلش موجود"} (بدون تكرار)`);
            setTimeout(() => setMsg(""), 8000);
          }, 50);
          return out;
        });
      } catch {
        setMsg("✕ الملف غير صالح");
        setTimeout(() => setMsg(""), 3000);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const counts = {
    creators: data.creators.length,
    campaigns: data.campaigns.length,
    expenses: data.expenses.length,
  };

  return (
    <div>
      <SectionTitle>الإعدادات والبيانات</SectionTitle>

      <FirebasePanel data={data} setData={setData} />

      <StaffManager data={data} upd={upd} staffList={staffList} />

      <div style={S.panel}>
        <div style={S.panelTitle}>رأس المال / الرصيد الابتدائي</div>
        <p style={S.settingHint}>
          المبلغ اللي بديت بيه قبل أي إيراد. الرصيد الحالي يُحسب من هذا + الإيرادات − كل المصروفات.
        </p>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <input
            style={{ ...S.input, maxWidth: 220 }}
            type="number"
            value={cap}
            onChange={(e) => setCap(e.target.value)}
            placeholder="0"
          />
          <button
            style={S.primaryBtn}
            onClick={() => {
              upd((d) => {
                d.capital = Number(cap) || 0;
                return d;
              });
              setMsg("✓ تم حفظ رأس المال");
              setTimeout(() => setMsg(""), 2500);
            }}
          >
            حفظ
          </button>
        </div>
      </div>

      <div style={{ ...S.panel, borderColor: "#9FE1D8" }}>
        <div style={{ ...S.panelTitle, color: "#0A4A42" }}>🔗 رابط الخادم (للقراءة التلقائية من Google Sheets)</div>
        <p style={S.settingHint}>
          إذا نشرت الخادم الوسيط (حسب الدليل)، حط رابطه هنا. وقتها المساعد يقرا شيتاتك تلقائياً بدون أي حجب. اتركه فارغ إذا ما عندك خادم — المساعد راح يحاول القراءة المباشرة أو رفع CSV.
        </p>
        <input
          style={{ ...S.input, direction: "ltr", textAlign: "left", marginBottom: 10 }}
          value={srv}
          onChange={(e) => {
            setSrv(e.target.value);
            setSrvTest("");
          }}
          placeholder="https://your-server.onrender.com"
        />
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <button
            style={S.primaryBtn}
            onClick={() => {
              upd((d) => {
                d.serverUrl = (srv || "").trim();
                return d;
              });
              setMsg("✓ تم حفظ رابط الخادم");
              setTimeout(() => setMsg(""), 2500);
            }}
          >
            حفظ
          </button>
          <button style={S.secondaryBtn} onClick={testServer}>
            افحص الاتصال
          </button>
          {srvTest && (
            <span style={{ fontSize: 13, fontWeight: 600, color: srvTest.startsWith("✓") ? "#0F6E56" : srvTest.startsWith("✕") ? "#A32D2D" : "#888780" }}>
              {srvTest}
            </span>
          )}
        </div>
      </div>

      <div style={S.panel}>
        <div style={S.panelTitle}>نسخ احتياطي للبيانات</div>
        <p style={S.settingHint}>
          البيانات محفوظة تلقائياً داخل المتصفح. للأمان الإضافي، صدّر نسخة ملف تحتفظ بيها أو تنقلها لجهاز ثاني.
        </p>
        <div style={S.dataRow}>
          <div style={S.dataStat}><b>{counts.creators}</b> كريتور</div>
          <div style={S.dataStat}><b>{counts.campaigns}</b> كامبين</div>
          <div style={S.dataStat}><b>{counts.expenses}</b> صرفية</div>
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
          <button style={S.primaryBtn} onClick={exportData}>⬇ تصدير نسخة (JSON)</button>
          <label style={S.secondaryBtn}>
            ⬆ استيراد نسخة
            <input type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
          </label>
        </div>
        <div style={{ marginTop: 12, padding: 12, background: "#F7FBFA", borderRadius: 10, border: "1px solid #D8EFE9" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#0A4A42", marginBottom: 8 }}>طريقة الاستيراد:</div>
          <label style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 8, cursor: "pointer" }}>
            <input type="radio" name="impmode" checked={importMode === "merge"} onChange={() => setImportMode("merge")} style={{ marginTop: 3 }} />
            <span style={{ fontSize: 13, lineHeight: 1.5 }}><b>دمج شامل بدون تكرار</b> (مُوصى) — استيراد واحد يسوي كلش: يضيف الكريتورز الجداد للقاعدة، يملأ النواقص (متابعين/أرقام/أسعار/محافظات)، يضيف كل الكامبينات بتفاصيلها، ويضيف سجلات المدفوعات — كله بدون تكرار. يحتفظ ببياناتك الحالية.</span>

          <label style={{ display: "flex", alignItems: "flex-start", gap: 8, cursor: "pointer" }}>

            value={data.autoBackupDays || 0}

          >

            <option value={1}>كل يوم</option>
            <option value={3}>كل 3 أيام</option>

      </div>

      <div style={{ ...S.panel, borderColor: "#F0997B" }}>

        <p style={S.settingHint}>مسح كل البيانات نهائياً. ما يمكن التراجع — صدّر نسخة أول.</p>
        <button
          style={S.dangerBtn}
          onClick={() => {
            if (confirm("متأكد تريد تمسح كل البيانات؟ ما راح ترجع.")) {
              setData(EMPTY);
              setCap(0);
              setMsg("تم مسح كل البيانات");
              setTimeout(() => setMsg(""), 2500);
            }
          }}
        >
          مسح كل شي
        </button>
      </div>

      {msg && <div style={S.toast}>{msg}</div>}
    </div>
  );
}

// ============================================================================
// مكوّنات مشتركة
// ============================================================================
function Shell({ children }) {
  return (
    <div dir="rtl" style={S.shell}>
      <style>{`
        @keyframes ugcblink {
          0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
          40% { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 640px) {
          ::-webkit-scrollbar { width: 6px; }
        }
      `}</style>
      {children}
    </div>
  );
}

function SectionTitle({ children, noMargin }) {
  return <h2 style={{ ...S.sectionTitle, marginBottom: noMargin ? 0 : 16 }}>{children}</h2>;
}

function StatCard({ label, value, hint, big, tone, raw }) {
  const color =
    tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : tone === "warn" ? "#854F0B" : "#0A4A42";
  return (
    <div style={{ ...S.statCard, ...(big ? S.statCardBig : {}) }}>
      <div style={S.statLabel}>{label}</div>
      <div style={{ ...S.statValue, color, fontSize: big ? 34 : 26 }}>
        {raw ? value : fmt(value)}
      </div>
      {hint && <div style={S.statHint}>{hint}</div>}
    </div>
  );
}

function MiniStat({ label, value, tone, raw }) {
  const color = tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : "#2C2C2A";
  return (
    <div style={S.miniStat}>
      <div style={S.miniLabel}>{label}</div>
      <div style={{ ...S.miniValue, color }}>{raw ? value : fmt(value)}</div>
    </div>
  );
}

function FlowRow({ label, value, bold, tone }) {
  const color = tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : value < 0 ? "#993C1D" : "#2C2C2A";
  return (
    <div style={{ ...S.flowRow, fontWeight: bold ? 600 : 400 }}>
      <span style={{ color: "#5F5E5A" }}>{label}</span>
      <span style={{ color, fontVariantNumeric: "tabular-nums" }}>
        {value < 0 ? "−" : ""}{fmt(Math.abs(value))}
      </span>
    </div>
  );
}

function StatusPill({ status }) {
  const s = STATUS[status];
  return (
    <span style={{ ...S.pill, background: s.bg, color: s.t }}>
      <span style={{ width: 6, height: 6, borderRadius: 99, background: s.c, display: "inline-block" }} />
      {s.label}
    </span>
  );
}

function SaveBadge({ state }) {
  if (state === "idle") return null;
  return (
    <span style={S.saveBadge}>
      {state === "saving" ? "...يحفظ" : "✓ محفوظ"}
    </span>
  );
}

function Empty({ text }) {
  return <div style={S.empty}>{text}</div>;
}

function Field({ label, children }) {
  return (
    <div style={S.field}>
      <label style={S.fieldLabel}>{label}</label>
      {children}
    </div>
  );
}

function FormActions({ onSave, onCancel }) {
  return (
    <div style={S.formActions}>
      <button style={S.secondaryBtn} onClick={onCancel}>إلغاء</button>
      <button style={S.primaryBtn} onClick={onSave}>حفظ</button>
    </div>
  );
}

function Modal({ title, children, onClose, wide }) {
  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div
        style={{ ...S.modal, maxWidth: wide ? 560 : 440 }}
        onClick={(e) => e.stopPropagation()}
      >
        <div style={S.modalHead}>
          <span style={S.modalTitle}>{title}</span>
          <button style={S.modalClose} onClick={onClose}>✕</button>
        </div>
        <div style={S.modalBody}>{children}</div>
      </div>
    </div>
  );
}

<script>
(function () {
  function showError(msg) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = '<div id="boot"><div class="mark">UGC</div><div class="err">صار خطأ بتحميل التطبيق:<br>' + msg + '<br><br>جرب تحدث الصفحة (Ctrl+Shift+R).</div></div>';
    }
  }
  try {
    if (typeof Babel === "undefined" || typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showError("ما گدر يحمل المكتبات من الانترنت. تأكد من اتصالك وحدث الصفحة.");
      return;
    }
    var source = document.getElementById("app-source").textContent;
    var out = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      sourceType: "script"
    }).code;
    var run = new Function(out);
    run();
  } catch (e) {
    showError((e && e.message) ? e.message : String(e));
    console.error(e);
  }
})();
</script>
