const fmtFollowers = (n) => {
  const v = Number(n) || 0;
  if (v <= 0) return "—";
  if (v >= 1_000_000) return (v / 1_000_000).toFixed(v % 1_000_000 === 0 ? 0 : 1).replace(/\.0$/, "") + "M";

};

const toUrl = (handle) => {
  if (!handle) return "#";
  let h = String(handle).trim();
  if (/^https?:\/\//i.test(h)) return h;
  if (h.startsWith("@")) h = h.slice(1);
  if (h.includes(".") || h.includes("/")) return "https://" + h;
  return "https://www.instagram.com/" + h;
};

// يحوّل رقم هاتف لرابط واتساب — يفترض كود العراق 964 إذا الرقم محلي
const waLink = (phone) => {
  if (!phone) return "#";
  let p = String(phone).replace(/[^\d+]/g, ""); // بس أرقام و +
  if (p.startsWith("+")) p = p.slice(1);
  else if (p.startsWith("00")) p = p.slice(2);
  else if (p.startsWith("0")) p = "964" + p.slice(1); // رقم عراقي محلي يبدي بـ 0
  else if (!p.startsWith("964")) p = "964" + p; // رقم بدون صفر ولا كود
  return "https://wa.me/" + p;
};

const STORE_KEY = "ugc_finance_v1";
const FB_URL_KEY = "ugc_firebase_url"; // رابط قاعدة Firebase (محفوظ محلياً حتى يكون متاح قبل تحميل الداتا)

// رابط Firebase الحالي (من التخزين المحلي)
function getFirebaseURL() {
  try { return (localStorage.getItem(FB_URL_KEY) || "").trim().replace(/\/+$/, ""); } catch (e) { return ""; }
}
function setFirebaseURL(url) {
  try {
    const clean = (url || "").trim().replace(/\/+$/, "");
    if (clean) localStorage.setItem(FB_URL_KEY, clean);
    else localStorage.removeItem(FB_URL_KEY);
  } catch (e) { /* تجاهل */ }
}

// تحميل البيانات: من Firebase إذا مفعّل، وإلا من التخزين المحلي
async function loadAll() {
  const fb = getFirebaseURL();
  if (fb) {
    try {
      const resp = await fetch(`${fb}/ugcData.json?auth=${await getFirebaseToken()}`);
      if (resp.ok) {
        const remote = await resp.json();
        if (remote && typeof remote === "object") {
          // خزّن نسخة محلية احتياطية
          try { localStorage.setItem(STORE_KEY, JSON.stringify(remote)); } catch (e) {}
          return remote;
        }
      }
    } catch (e) {
      // فشل الاتصال بالسحابة — نرجع للنسخة المحلية
    }
  }
  try {
    const v = localStorage.getItem(STORE_KEY);
    if (v) return JSON.parse(v);
  } catch (e) {
    /* مفتاح غير موجود بعد — طبيعي بأول استخدام */
  }
  return null;
}

// حفظ البيانات: للتخزين المحلي دائماً + Firebase إذا مفعّل
async function saveAll(data) {
  let localOk = false;
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    localOk = true;
  } catch (e) { localOk = false; }
  const fb = getFirebaseURL();
  if (fb) {
    try {
      const resp = await fetch(`${fb}/ugcData.json?auth=${await getFirebaseToken()}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...data, _updatedAt: Date.now() }),
      });
      return resp.ok;
    } catch (e) {
      return localOk; // نجح محلياً على الأقل
    }
  }
  return localOk;
}

// جلب وقت آخر تحديث من السحابة (للمزامنة اللحظية)
async function fetchRemoteUpdatedAt() {
  const fb = getFirebaseURL();
  if (!fb) return null;
  try {
    const resp = await fetch(`${fb}/ugcData/_updatedAt.json`);
    if (resp.ok) return await resp.json();
  } catch (e) {}
  return null;
}

function App() {
  const [authed, setAuthed] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinErr, setPinErr] = useState(false);
  const [currentUser, setCurrentUser] = useState(null); // null=الأدمن الرئيسي، أو كائن الموظف

  const [data, setData] = useState(EMPTY);
  const [loaded, setLoaded] = useState(false);
  // قائمة الموظفين من البيانات (أو الافتراضية) — لازم بعد تعريف data
  const staffList = (data.staff && data.staff.length) ? data.staff : DEFAULT_STAFF;
  // هل المستخدم الحالي موظف بصلاحية محدودة؟ (الأدمن الرئيسي والموظف-أدمن يشوفون كلشي)
  const isFullAdmin = !currentUser || currentUser.role === "admin"; // يشوف الأرباح والإعدادات
  const isStaff = !!currentUser && currentUser.role !== "admin"; // صلاحية محدودة
  const [tab, setTab] = useState("overview");
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved
  const [syncMsg, setSyncMsg] = useState(""); // رسالة مزامنة Firebase

  // تحميل أولي
  useEffect(() => {
    (async () => {
      const d = await loadAll();
      if (d) setData({ ...EMPTY, ...d });
      setLoaded(true);
    })();
  }, []);

  // حفظ تلقائي عند أي تغيير
  const lastSaveAt = useRef(0);
  useEffect(() => {
    if (!loaded) return;
    setSaveState("saving");
    const t = setTimeout(async () => {
      lastSaveAt.current = Date.now();
      await saveAll(data);
      setSaveState("saved");
      setTimeout(() => setSaveState("idle"), 1500);
    }, 400);
    return () => clearTimeout(t);
  }, [data, loaded]);

  // مزامنة لحظية: إذا Firebase مفعّل، نفحص كل 5 ثواني إذا أكو تحديث من جهاز ثاني
  useEffect(() => {
    if (!loaded) return;
    const fb = getFirebaseURL();
    if (!fb) return;
    let stop = false;
    const poll = async () => {
      if (stop) return;
      const remoteAt = await fetchRemoteUpdatedAt();
      // إذا التحديث البعيد أحدث من آخر حفظ سويناه إحنا بفرق محسوس، نسحب النسخة الجديدة
      if (remoteAt && remoteAt > lastSaveAt.current + 2000) {
        const fresh = await loadAll();
        if (fresh && !stop) {
          lastSaveAt.current = remoteAt; // حتى ما نعيد السحب لنفس النسخة
          setData({ ...EMPTY, ...fresh });
          setSyncMsg("🔄 انتحدثت البيانات من جهاز ثاني");
          setTimeout(() => setSyncMsg(""), 3000);
        }
      }
    };
    const iv = setInterval(poll, 5000);
    return () => { stop = true; clearInterval(iv); };
  }, [loaded, data.serverUrl]);

  // نسخة احتياطية تلقائية: تنزّل ملف بيانات إذا مرّت المدة المحددة
  useEffect(() => {
    if (!loaded || !authed) return;
    const days = Number(data.autoBackupDays) || 0;
    if (days <= 0) return;
    const ms = days * 24 * 60 * 60 * 1000;
    const due = !data.lastBackupAt || Date.now() - data.lastBackupAt >= ms;
    if (!due) return;
    // نزّل النسخة (بعد ثانيتين حتى ما تتعارض مع تحميل الصفحة)
    const t = setTimeout(() => {
      try {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `ugc-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        upd((d) => { d.lastBackupAt = Date.now(); return d; });
      } catch (e) { /* تجاهل */ }
    }, 2000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [loaded, authed, data.autoBackupDays, data.lastBackupAt]);

  // ---- حسابات مشتقة --------------------------------------------------------
  const calc = useMemo(() => {
    const creatorsDue = data.creators.reduce(
      (s, c) => s + (Number(c.amount) || 0),
      0
    );
    const creatorsPaid = data.creators.reduce(
      (s, c) => s + (Number(c.paid) || 0),
      0
    );
    const creatorsOutstanding = creatorsDue - creatorsPaid;

    const revenue = data.campaigns.reduce(
      (s, c) => s + (Number(c.revenue) || 0),
      0
    );
    const campaignCost = data.campaigns.reduce(
      (s, c) => s + (Number(c.cost) || 0),
      0
    );
    const grossProfit = revenue - campaignCost;

    const companyExp = data.expenses
      .filter((e) => e.type === "company")
      .reduce((s, e) => s + (Number(e.amount) || 0), 0);
    const personalExp = data.expenses
      .filter((e) => e.type === "personal")
      .reduce((s, e) => s + (Number(e.amount) || 0), 0);

    // الرصيد = رأس المال + المدفوع للشركة (الإيراد) - تكاليف الكامبينات - مدفوعات الكريتورز المدفوعة فعلاً - الصرفيات
    const companyBalance =
      (Number(data.capital) || 0) +
      revenue -
      campaignCost -
      creatorsPaid -
      companyExp -
      personalExp;

    const netProfit = grossProfit - companyExp;

    return {
      creatorsDue,
      creatorsPaid,
      creatorsOutstanding,
      revenue,
      campaignCost,
      grossProfit,
      companyExp,
      personalExp,
      companyBalance,
      netProfit,
    };
  }, [data]);

  // توزيع الأرباح بين الشركاء عبر كل الكامبينات
  const partnerTotals = useMemo(() => {
    const map = {};
    data.campaigns.forEach((c) => {
      const profit = (Number(c.revenue) || 0) - (Number(c.cost) || 0);
      (c.splits || []).forEach((s) => {
        const share = (profit * (Number(s.pct) || 0)) / 100;
        map[s.name] = (map[s.name] || 0) + share;
      });
    });
    return Object.entries(map)
      .map(([name, amount]) => ({ name, amount }))
      .sort((a, b) => b.amount - a.amount);
  }, [data.campaigns]);

  // ---- إحصائيات نشاط الكريتورز (للمفضلين وكشف الإفراط) ----------------------
  // يحسب من قائمة المدفوعات: كم كامبين اشتغل وياه كل كريتور، وكم مرة هذا الشهر
  const creatorStats = useMemo(() => {
    const norm = (s) => {
      const h = String(s || "").trim().toLowerCase();
      const m = h.match(/instagram\.com\/([\w._]+)/) || h.match(/tiktok\.com\/@([\w._]+)/);
      return m ? m[1] : h;
    };
    const now = new Date();
    const thisMonth = now.getFullYear() + "-" + (now.getMonth() + 1);
    const map = {}; // key -> {name, handle, campaigns:Set, thisMonthCount, dates:[], prices:[]}

    // (١) المصدر الدائم: قاعدة الكريتورز — تاريخ الكامبينات والمحافظة محفوظ هنا ولا يتأثر بتصفير الدفعات
    (data.creatorsDB || []).forEach((c) => {
      const key = norm(c.handle) || ("name:" + String(c.name || "").toLowerCase().trim());
      if (!key || key === "name:") return;
      if (!map[key]) map[key] = { name: c.name || "", handle: c.handle || "", province: c.province || "", campaigns: new Set(), thisMonthCount: 0, dates: [], prices: [], lastDate: null };
      const e = map[key];
      if (!e.province && c.province) e.province = c.province;
      // قائمة الكامبينات المحفوظة بالقاعدة (إن وجدت)
      (c.campaigns || []).forEach((cn) => { if (cn) e.campaigns.add(cn); });
      // تاريخ الأسعار المحفوظ بالقاعدة
      (c.priceHistory || []).forEach((ph) => {
        if (ph && Number(ph.price) > 0) e.prices.push({ price: Number(ph.price), date: ph.date || "", campaign: ph.campaign || "" });
      });
    });

    // (٢) المصدر الحي: المدفوعات الحالية — يضيف فوق الدائم (بدون تكرار الكامبين)
    (data.creators || []).forEach((c) => {
      const key = norm(c.handle) || ("name:" + String(c.name || "").toLowerCase().trim());
      if (!key || key === "name:") return;
      if (!map[key]) map[key] = { name: c.name || "", handle: c.handle || "", province: c.province || "", campaigns: new Set(), thisMonthCount: 0, dates: [], prices: [], lastDate: null };
      const e = map[key];
      if (c.campaign) e.campaigns.add(c.campaign);
      if (!e.name && c.name) e.name = c.name;
      if (!e.handle && c.handle) e.handle = c.handle;
      if (!e.province && c.province) e.province = c.province;
      const d = c.date || "";
      if (d) {
        e.dates.push(d);
        if (!e.lastDate || d > e.lastDate) e.lastDate = d;
        const dm = new Date(d);
        if (!isNaN(dm) && (dm.getFullYear() + "-" + (dm.getMonth() + 1)) === thisMonth) e.thisMonthCount++;
      }
      if (Number(c.amount) > 0) e.prices.push({ price: Number(c.amount), date: d, campaign: c.campaign || "" });
    });

    // حوّل لكائن بمفاتيح + دوال مساعدة
    const byKey = {};
    Object.entries(map).forEach(([k, v]) => {
      byKey[k] = {
        name: v.name, handle: v.handle, province: v.province,
        campaignCount: v.campaigns.size,
        campaigns: Array.from(v.campaigns),
        thisMonthCount: v.thisMonthCount,
        lastDate: v.lastDate,
        prices: v.prices.sort((a, b) => (a.date || "").localeCompare(b.date || "")),
      };
    });
    return { byKey, norm };
  }, [data.creators, data.creatorsDB]);

  // ---- مُعدّلات البيانات ---------------------------------------------------
  const upd = useCallback((fn) => setData((d) => fn(structuredClone(d))), []);

  // ---- نظام الحذف الآمن (سلة محذوفات + تراجع) -------------------------------
  const [lastUndo, setLastUndo] = useState(null); // {label, count} لإظهار شريط التراجع
  const undoTimerRef = React.useRef(null);

  // حذف ناعم: ينقل العناصر لسلة المحذوفات بدل الحذف النهائي
  // kind: 'creator'|'creatorDB'|'campaign'|'expense' — items: مصفوفة العناصر المحذوفة — label: نص للعرض
  const softDelete = useCallback((kind, items, label) => {
    const arr = Array.isArray(items) ? items : [items];
    if (arr.length === 0) return;
    const now = Date.now();
    const trashEntries = arr.map((it, i) => ({
      trashId: "t" + now + "_" + i + Math.random().toString(36).slice(2, 5),
      kind,
      item: structuredClone(it),
      deletedAt: now,
    }));
    upd((d) => {
      d.trash = [...trashEntries, ...(d.trash || [])];
      // شيل العناصر من مكانها الأصلي
      const ids = arr.map((x) => x.id);
      if (kind === "creator") d.creators = d.creators.filter((x) => !ids.includes(x.id));
      else if (kind === "creatorDB") d.creatorsDB = (d.creatorsDB || []).filter((x) => !ids.includes(x.id));
      else if (kind === "campaign") d.campaigns = d.campaigns.filter((x) => !ids.includes(x.id));
      else if (kind === "expense") d.expenses = d.expenses.filter((x) => !ids.includes(x.id));
      return d;
    });
    // فعّل شريط التراجع
    setLastUndo({ label: label || `حُذف ${arr.length} عنصر`, count: arr.length, trashIds: trashEntries.map((t) => t.trashId) });
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    undoTimerRef.current = setTimeout(() => setLastUndo(null), 8000); // يختفي بعد 8 ثواني
  }, [upd]);

  // استرجاع من سلة المحذوفات
  const restoreFromTrash = useCallback((trashIds) => {
    const ids = Array.isArray(trashIds) ? trashIds : [trashIds];
    upd((d) => {
      const toRestore = (d.trash || []).filter((t) => ids.includes(t.trashId));
      toRestore.forEach((t) => {
        if (t.kind === "creator") d.creators = [t.item, ...d.creators];
        else if (t.kind === "creatorDB") d.creatorsDB = [t.item, ...(d.creatorsDB || [])];
        else if (t.kind === "campaign") d.campaigns = [t.item, ...d.campaigns];
        else if (t.kind === "expense") d.expenses = [t.item, ...d.expenses];
      });
      d.trash = (d.trash || []).filter((t) => !ids.includes(t.trashId));
      return d;
    });
    setLastUndo(null);
  }, [upd]);

  const undoLast = useCallback(() => {
    if (lastUndo && lastUndo.trashIds) restoreFromTrash(lastUndo.trashIds);
  }, [lastUndo, restoreFromTrash]);

  // حذف نهائي من السلة
  const purgeFromTrash = useCallback((trashIds) => {
    const ids = Array.isArray(trashIds) ? trashIds : [trashIds];
    upd((d) => {
      d.trash = (d.trash || []).filter((t) => !ids.includes(t.trashId));
      return d;
    });
  }, [upd]);

  const emptyTrash = useCallback(() => {
    upd((d) => { d.trash = []; return d; });
  }, [upd]);

  // ---- البلاك ليست ---------------------------------------------------------
  const addToBlacklist = useCallback((entry) => {
    upd((d) => {
      d.blacklist = d.blacklist || [];
      d.blacklist.unshift({
        id: "bl" + Date.now() + Math.random().toString(36).slice(2, 6),
        name: entry.name || "",
        handle: entry.handle || "",
        reason: entry.reason || "",
        addedBy: entry.addedBy || "",
        addedAt: Date.now(),
      });
      return d;
    });
  }, [upd]);

  const removeFromBlacklist = useCallback((id) => {
    upd((d) => {
      d.blacklist = (d.blacklist || []).filter((b) => b.id !== id);
      return d;
    });
  }, [upd]);

  // دالة فحص: هل هذا الكريتور بالبلاك ليست؟ (تطابق بالرابط أو الاسم)
  const blacklistSet = useMemo(() => {
    const norm = (s) => {
      const h = String(s || "").trim().toLowerCase();
      const m = h.match(/instagram\.com\/([\w._]+)/) || h.match(/tiktok\.com\/@([\w._]+)/);
      return m ? m[1] : h;
    };
    const set = {};
    (data.blacklist || []).forEach((b) => {
      const k = norm(b.handle) || ("name:" + String(b.name || "").toLowerCase().trim());
      if (k) set[k] = b;
    });
    return { set, norm };
  }, [data.blacklist]);

  const isBlacklisted = useCallback((handle, name) => {
    const k = blacklistSet.norm(handle) || ("name:" + String(name || "").toLowerCase().trim());
    return blacklistSet.set[k] || null;
  }, [blacklistSet]);

  // ---- شاشة الدخول ---------------------------------------------------------
  if (!authed) {
    // يتحقق من رمز الأدمن أو رمز أي موظف
    const tryLogin = () => {
      const code = pinInput.trim();
      if (code === PIN) { setCurrentUser(null); setAuthed(true); return; }
      const staff = staffList.find((s) => s.code.toLowerCase() === code.toLowerCase() || s.user.toLowerCase() === code.toLowerCase());
      if (staff) { setCurrentUser(staff); setAuthed(true); return; }
      setPinErr(true);
    };
    return (
      <Shell>
        <div style={S.lockWrap}>
          <div style={S.lockCard}>
            <div style={S.lockIcon}>🔒</div>
            <h1 style={S.lockTitle}>UGC Iraq — مالية</h1>
            <p style={S.lockSub}>أدخل رمز الدخول الخاص بك للمتابعة.</p>
            <input
              type="password"
              value={pinInput}
              onChange={(e) => {
                setPinInput(e.target.value);
                setPinErr(false);
              }}
              onKeyDown={(e) => { if (e.key === "Enter") tryLogin(); }}
              placeholder="رمز الدخول"
              style={{ ...S.lockInput, borderColor: pinErr ? "#E24B4A" : "#D3D1C7" }}
              autoFocus
            />
            {pinErr && <div style={S.lockErr}>رمز الدخول غلط</div>}
            <button style={S.lockBtn} onClick={tryLogin}>
              دخول
            </button>
          </div>
        </div>
      </Shell>
    );
  }

  if (!loaded) {
    return (
      <Shell>
        <div style={{ ...S.lockWrap }}>
          <div style={{ color: "#888780", fontSize: 15 }}>...يحمّل البيانات</div>
        </div>
      </Shell>
    );
  }

  // ---- الواجهة الرئيسية -----------------------------------------------------
  const allTabs = [
    { id: "overview", label: "نظرة عامة", icon: "📊", adminOnly: true },
    { id: "creators", label: "مدفوعات الكريتورز", icon: "🎬" },
    { id: "database", label: "قاعدة الكريتورز", icon: "📇" },
    { id: "tasks", label: "تاسكاتي", icon: "✅", staffOnly: true },
    { id: "chat", label: "المساعد الذكي", icon: "🤖" },
    { id: "campaigns", label: "الكامبينات والأرباح", icon: "📈", adminOnly: true },
    { id: "expenses", label: "الصرفيات", icon: "💸", adminOnly: true },
    { id: "blacklist", label: "بلاك ليست", icon: "🚫" },
    { id: "trash", label: "سلة المحذوفات", icon: "🗑️" },
    { id: "settings", label: "إعدادات", icon: "⚙️", adminOnly: true },
  ];
  // الموظف العادي ما يشوف التبويبات الإدارية (الأرباح، الصرفيات، الإعدادات، النظرة العامة)
  // الموظف-أدمن (role=admin) يشوف كلشي مثل الأدمن الرئيسي
  const tabs = allTabs.filter((t) => {
    if (t.adminOnly && !isFullAdmin) return false;
    if (t.staffOnly && !isStaff) return false;
    return true;
  });
  // لو المستخدم على تبويب ممنوع، رجّعه لمدفوعات الكريتورز
  if (!tabs.find((t) => t.id === tab)) {
    if (tab !== "creators") setTimeout(() => setTab("creators"), 0);
  }

  return (
    <Shell>
      <div style={S.app}>
        {/* الشريط العلوي */}
        <header style={S.header}>
          <div style={S.brand}>
            <div style={S.brandMark}>UGC</div>
            <div>
              <div style={S.brandName}>UGC IRAQ</div>
              <div style={S.brandSub}>{currentUser ? `${currentUser.name} — ${currentUser.role === "admin" ? "أدمن" : "موظف"}` : "UGC Iraq"}</div>
            </div>
          </div>
          <div style={S.headerRight}>
            {syncMsg && <span style={{ fontSize: 12, color: "#0F9E8E", fontWeight: 700 }}>{syncMsg}</span>}
            <SaveBadge state={saveState} />
            <button style={S.logoutBtn} onClick={() => { setAuthed(false); setCurrentUser(null); setPinInput(""); }}>
              قفل
            </button>
          </div>
        </header>

        {/* التبويبات */}
        <nav style={S.tabBar}>
          {tabs.map((t) => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              style={{
                ...S.tab,
                ...(tab === t.id ? S.tabActive : {}),
              }}
            >
              <span style={{ fontSize: 15 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </nav>

        <main style={S.main}>
          {tab === "overview" && isFullAdmin && (
            <Overview calc={calc} partnerTotals={partnerTotals} data={data} creatorStats={creatorStats} />
          )}
          {tab === "creators" && (
            <CreatorsTab data={data} upd={upd} calc={calc} softDelete={softDelete} creatorStats={creatorStats} isBlacklisted={isBlacklisted} addToBlacklist={addToBlacklist} isStaff={isStaff} currentUser={currentUser} />
          )}
          {tab === "database" && <DatabaseTab data={data} upd={upd} softDelete={softDelete} creatorStats={creatorStats} isBlacklisted={isBlacklisted} addToBlacklist={addToBlacklist} />}
          {tab === "tasks" && isStaff && <TasksTab data={data} upd={upd} currentUser={currentUser} />}
          {tab === "chat" && <ChatTab data={data} upd={upd} softDelete={softDelete} />}
          {tab === "campaigns" && isFullAdmin && (
            <CampaignsTab data={data} upd={upd} partnerTotals={partnerTotals} softDelete={softDelete} />
          )}
          {tab === "expenses" && isFullAdmin && <ExpensesTab data={data} upd={upd} calc={calc} softDelete={softDelete} />}
          {tab === "blacklist" && (
            <BlacklistTab data={data} addToBlacklist={addToBlacklist} removeFromBlacklist={removeFromBlacklist} />
          )}
          {tab === "trash" && (
            <TrashTab data={data} restoreFromTrash={restoreFromTrash} purgeFromTrash={purgeFromTrash} emptyTrash={emptyTrash} />
          )}
          {tab === "settings" && isFullAdmin && (
            <SettingsTab data={data} setData={setData} upd={upd} staffList={staffList} />
          )}
        </main>

        {/* شريط التراجع (يطلع مؤقتاً بعد الحذف) */}
        {lastUndo && (
          <div style={S.undoBar}>
            <span style={S.undoText}>🗑️ {lastUndo.label}</span>
            <button style={S.undoBtn} onClick={undoLast}>↩ تراجع</button>
            <button style={S.undoClose} onClick={() => setLastUndo(null)}>✕</button>
          </div>
        )}
      </div>
    </Shell>
  );
}

// ============================================================================
// نظرة عامة
// ============================================================================
function Overview({ calc, partnerTotals, data, creatorStats }) {
  const cards = [
    {
      label: "رصيد الشركة الحالي",
      value: calc.companyBalance,
      hint: "رأس المال + الإيرادات − كل المصروفات والمدفوعات",
      big: true,
      tone: calc.companyBalance >= 0 ? "good" : "bad",
    },
    {
      label: "باقي على الكريتورز",
      value: calc.creatorsOutstanding,
      hint: `مدفوع ${fmt(calc.creatorsPaid)} من ${fmt(calc.creatorsDue)}`,
      tone: calc.creatorsOutstanding > 0 ? "warn" : "good",
    },
    {
      label: "إجمالي الإيرادات",
      value: calc.revenue,
      hint: `من ${data.campaigns.length} كامبين`,
    },
    {
      label: "صافي الربح",
      value: calc.netProfit,
      hint: "الربح الإجمالي − صرفيات الشركة",
      tone: calc.netProfit >= 0 ? "good" : "bad",
    },
  ];

  return (
    <div>
      <SectionTitle>الملخّص المالي</SectionTitle>
      <div style={S.cardGrid}>
        {cards.map((c, i) => (
          <StatCard key={i} {...c} />
        ))}
      </div>

      <div style={S.twoCol}>
        <div style={S.panel}>
          <div style={S.panelTitle}>توزيع الأرباح على الشركاء</div>
          {partnerTotals.length === 0 ? (
            <Empty text="ماكو شركاء بعد. أضف توزيع داخل أي كامبين." />
          ) : (
            <div>
              {partnerTotals.map((p, i) => {
                const max = Math.max(...partnerTotals.map((x) => Math.abs(x.amount)), 1);
                const w = (Math.abs(p.amount) / max) * 100;
                return (
                  <div key={i} style={S.barRow}>
                    <div style={S.barLabel}>{p.name}</div>
                    <div style={S.barTrack}>
                      <div
                        style={{
                          ...S.barFill,
                          width: `${w}%`,
                          background: p.amount >= 0 ? "#0F9E8E" : "#E24B4A",
                        }}
                      />
                    </div>
                    <div style={S.barVal}>{fmt(p.amount)}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={S.panel}>
          <div style={S.panelTitle}>أين تذهب الأموال</div>
          <FlowRow label="الإيرادات الداخلة" value={calc.revenue} tone="good" />
          <FlowRow label="تكاليف الكامبينات" value={-calc.campaignCost} />
          <FlowRow
            label="مدفوع للكريتورز فعلاً"
            value={-calc.creatorsPaid}
          />
          <FlowRow label="صرفيات الشركة" value={-calc.companyExp} />
          <FlowRow label="صرفيات شخصية" value={-calc.personalExp} />
          <div style={S.flowDivider} />
          <FlowRow
            label="الرصيد الناتج"
            value={calc.companyBalance}
            bold
            tone={calc.companyBalance >= 0 ? "good" : "bad"}
          />
        </div>
      </div>

      {/* ===== التنبيهات الذكية ===== */}
      {(() => {
        const creators = data.creators || [];
        const statusOf = (c) => {
          if (c.payStatus && ["paid", "partial", "unpaid"].includes(c.payStatus)) return c.payStatus;
          const a = Number(c.amount) || 0, p = Number(c.paid) || 0;
          if (p <= 0) return "unpaid"; if (p >= a) return "paid"; return "partial";
        };
        const publishedUnpaid = creators.filter((c) => c.pubStatus === "published" && (Number(c.amount) || 0) - (Number(c.paid) || 0) > 0);
        const publishedNoLink = creators.filter((c) => c.pubStatus === "published" && !c.pubLink);
        const unpaidTotal = creators.filter((c) => statusOf(c) !== "paid");
        const alerts = [];
        if (publishedUnpaid.length > 0) {
          const amt = publishedUnpaid.reduce((s, c) => s + ((Number(c.amount) || 0) - (Number(c.paid) || 0)), 0);
          alerts.push({ icon: "⭐", tone: "warn", text: `${publishedUnpaid.length} كريتور نشروا الفيديو وباقي عليهم ${fmt(amt)} — هدول أولوية الدفع.` });
        }
        if (publishedNoLink.length > 0) {
          alerts.push({ icon: "🔗", tone: "info", text: `${publishedNoLink.length} كريتور محدّدين «نشر» بس بدون رابط — أضف روابط النشر حتى توثّقها.` });
        }
        if (unpaidTotal.length > 0) {
          const amt = unpaidTotal.reduce((s, c) => s + ((Number(c.amount) || 0) - (Number(c.paid) || 0)), 0);
          alerts.push({ icon: "💰", tone: "info", text: `إجمالي ${unpaidTotal.length} كريتور باقي عليهم ${fmt(amt)} (شامل اللي ما نشروا).` });
        }
        if (alerts.length === 0) return null;
        return (
          <div style={{ marginTop: 24 }}>
            <div style={S.panelTitle}>🔔 تنبيهات</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {alerts.map((a, i) => (
                <div key={i} style={{ ...S.smartAlert, ...(a.tone === "warn" ? S.smartAlertWarn : S.smartAlertInfo) }}>
                  <span style={{ fontSize: 16 }}>{a.icon}</span>
                  <span>{a.text}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ===== إحصائيات الكامبينات ===== */}
      {(() => {
        const creators = data.creators || [];
        // تجميع حسب الكامبين
        const byCamp = {};
        creators.forEach((c) => {
          const k = c.campaign || "بدون كامبين";
          if (!byCamp[k]) byCamp[k] = { name: k, count: 0, due: 0, paid: 0 };
          byCamp[k].count++;
          byCamp[k].due += Number(c.amount) || 0;
          byCamp[k].paid += Number(c.paid) || 0;
        });
        const camps = Object.values(byCamp).sort((a, b) => b.due - a.due);
        const totalDue = creators.reduce((s, c) => s + (Number(c.amount) || 0), 0);
        const withPrice = creators.filter((c) => (Number(c.amount) || 0) > 0);
        const avgPrice = withPrice.length ? Math.round(totalDue / withPrice.length) : 0;
        const maxC = withPrice.length ? Math.max(...withPrice.map((c) => Number(c.amount) || 0)) : 0;
        const minC = withPrice.length ? Math.min(...withPrice.map((c) => Number(c.amount) || 0)) : 0;
        if (creators.length === 0) return null;
        return (
          <div style={{ marginTop: 24 }}>
            <div style={S.panelTitle}>📊 إحصائيات الكريتورز والكامبينات</div>
            <div style={S.statMiniGrid}>
              <div style={S.statMini}><div style={S.statMiniVal}>{fmt(avgPrice)}</div><div style={S.statMiniLbl}>متوسط سعر الكريتور</div></div>
              <div style={S.statMini}><div style={S.statMiniVal}>{fmt(maxC)}</div><div style={S.statMiniLbl}>أعلى سعر</div></div>
              <div style={S.statMini}><div style={S.statMiniVal}>{fmt(minC)}</div><div style={S.statMiniLbl}>أقل سعر</div></div>
              <div style={S.statMini}><div style={S.statMiniVal}>{creators.length}</div><div style={S.statMiniLbl}>إجمالي الكريتورز</div></div>
            </div>
            <div style={{ ...S.panel, marginTop: 14 }}>
              <div style={S.panelTitle}>الصرف على كل كامبين</div>
              {camps.map((c, i) => {
                const max = Math.max(...camps.map((x) => x.due), 1);
                const w = (c.due / max) * 100;
                return (
                  <div key={i} style={S.barRow}>
                    <div style={{ ...S.barLabel, minWidth: 120 }}>{c.name} <span style={{ color: "#A8A6A0", fontSize: 11 }}>({c.count})</span></div>
                    <div style={S.barTrack}>
                      <div style={{ ...S.barFill, width: `${w}%`, background: "#0F9E8E" }} />
                    </div>
                    <div style={S.barVal}>{fmt(c.due)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ⭐ أكثر الكريتورز تعاملاً (توب 10) */}
      {creatorStats && Object.keys(creatorStats.byKey).length > 0 && (() => {
        const top = Object.values(creatorStats.byKey)
          .filter((s) => s.campaignCount >= 1)
          .sort((a, b) => b.campaignCount - a.campaignCount)
          .slice(0, 10);
        if (!top.length) return null;
        const maxC = Math.max(...top.map((s) => s.campaignCount), 1);
        return (
          <div style={{ marginTop: 28 }}>
            <SectionTitle>⭐ أكثر الكريتورز تعاملاً وياك</SectionTitle>
            <p style={{ fontSize: 12.5, color: "#A8A6A0", margin: "-8px 0 12px", lineHeight: 1.6 }}>
              📇 مرتبط بقاعدة الكريتورز — محفوظ بشكل دائم، ما يتأثر بتصفير الدفعات
            </p>
            <div style={S.panel}>
              {top.map((s, i) => (
                <div key={i} style={S.barRow}>
                  <div style={{ ...S.barLabel, minWidth: 160, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: "#A8A6A0", fontWeight: 800, fontSize: 12, minWidth: 18 }}>{i + 1}.</span>
                    <span>{s.name || s.handle || "—"}</span>
                    {s.campaignCount >= 3 && <span style={S.badgeFav}>⭐</span>}
                  </div>
                  <div style={S.barTrack}>
                    <div style={{ ...S.barFill, width: `${(s.campaignCount / maxC) * 100}%`, background: "#E8A317" }} />
                  </div>
                  <div style={{ ...S.barVal, minWidth: 70 }}>{s.campaignCount} كامبين</div>
                </div>
              ))}
            </div>
            <p style={{ fontSize: 12.5, color: "#888780", margin: "8px 2px 0" }}>
              💡 هذوله أكثر ناس اشتغلوا وياك — مرشحين ممتازين للتعاون المتكرر بالكامبينات الجاية.
            </p>
          </div>
        );
      })()}

      {/* 🗺️ توزيع الكريتورز على المحافظات */}
      {(() => {
        const byProv = {};
        (data.creatorsDB || []).forEach((c) => {
          const p = (c.province || "").trim();
          if (p) byProv[p] = (byProv[p] || 0) + 1;
        });
        const provs = Object.entries(byProv).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
        if (!provs.length) return null;
        const maxP = Math.max(...provs.map((p) => p.count), 1);
        return (
          <div style={{ marginTop: 28 }}>
            <SectionTitle>🗺️ توزيع الكريتورز على المحافظات</SectionTitle>
            <div style={S.panel}>
              {provs.map((p, i) => (
                <div key={i} style={S.barRow}>
                  <div style={{ ...S.barLabel, minWidth: 120 }}>{p.name}</div>
                  <div style={S.barTrack}>
                    <div style={{ ...S.barFill, width: `${(p.count / maxP) * 100}%`, background: "#0F9E8E" }} />
                  </div>
                  <div style={S.barVal}>{p.count}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ============================================================================
// تبويب التاسكات للموظف
// ============================================================================
function TasksTab({ data, upd, currentUser }) {
  const myCampaigns = currentUser.campaigns || [];
  const tasks = (data.tasks || []).filter((t) => t.user === currentUser.user);
  const [newTask, setNewTask] = useState("");
  const [newTaskCamp, setNewTaskCamp] = useState(myCampaigns[0] || "");

  const addTask = () => {
    if (!newTask.trim()) return;
    upd((d) => {
      d.tasks = d.tasks || [];
      d.tasks.unshift({ id: "t" + Date.now(), user: currentUser.user, text: newTask.trim(), campaign: newTaskCamp, done: false, at: Date.now(), by: "self" });
      return d;
    });
    setNewTask("");
  };
  const toggleTask = (id) => upd((d) => { const t = (d.tasks || []).find((x) => x.id === id); if (t) t.done = !t.done; return d; });
  const delTask = (id) => upd((d) => { d.tasks = (d.tasks || []).filter((x) => x.id !== id); return d; });

  const campStats = myCampaigns.map((cn) => {
    const creators = data.creators.filter((c) => (c.campaign || "") === cn);
    return { name: cn, count: creators.length, due: creators.reduce((s, c) => s + (Number(c.amount) || 0), 0) };
  });

  return (
    <div>
      <SectionTitle>أهلاً {currentUser.name} 👋</SectionTitle>

      <div style={S.panel}>
        <div style={S.panelTitle}>📋 الكامبينات المسؤول عنها</div>
        {myCampaigns.length === 0 ? (
          <Empty text="ماكو كامبينات مخصصة لك بعد." />
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12, marginTop: 10 }}>
            {campStats.map((c) => (
              <div key={c.name} style={{ background: "#F2FBF9", border: "1px solid #D6F0EA", borderRadius: 12, padding: 14 }}>
                <div style={{ fontWeight: 800, color: "#0A4A42", fontSize: 15, marginBottom: 6 }}>{c.name}</div>
                <div style={{ fontSize: 13, color: "#555" }}>{c.count} كريتور · مستحق ${fmt(c.due)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={S.panel}>
        <div style={S.panelTitle}>✅ تاسكاتي</div>
        <div style={{ display: "flex", gap: 8, marginTop: 10, marginBottom: 14, flexWrap: "wrap" }}>
          <input style={{ ...S.input, flex: 1, minWidth: 200 }} value={newTask} onChange={(e) => setNewTask(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addTask()} placeholder="اكتب تاسك جديد..." />
          <select style={{ ...S.input, maxWidth: 180 }} value={newTaskCamp} onChange={(e) => setNewTaskCamp(e.target.value)}>
            <option value="">بدون كامبين</option>
            {myCampaigns.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          <button style={S.primaryBtn} onClick={addTask}>+ أضف تاسك</button>
        </div>
        {tasks.length === 0 ? (
          <Empty text="ماكو تاسكات بعد. أضف أول واحد فوق." />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {tasks.map((t) => (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: t.done ? "#F0F7F0" : "#fff", border: "1px solid #EBE9E1", borderRadius: 10 }}>
                <input type="checkbox" checked={t.done} onChange={() => toggleTask(t.id)} style={{ width: 18, height: 18, cursor: "pointer" }} />
                <div style={{ flex: 1 }}>
                  <span style={{ fontSize: 14, textDecoration: t.done ? "line-through" : "none", color: t.done ? "#999" : "#1a1a1a" }}>{t.text}</span>
                  {t.campaign && <span style={{ marginRight: 8, fontSize: 11, background: "#E1F5F2", color: "#0A4A42", padding: "2px 8px", borderRadius: 20 }}>{t.campaign}</span>}
                  {t.by === "admin" && <span style={{ marginRight: 6, fontSize: 11, background: "#FFF1DC", color: "#A86A00", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>📌 من الإدارة</span>}
                </div>
                <button style={S.iconBtnDanger} onClick={() => delTask(t.id)} title="حذف">✕</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================================
// تبويب مدفوعات الكريتورز
// ============================================================================
function CreatorsTab({ data, upd, softDelete, creatorStats, isBlacklisted, addToBlacklist, isStaff, currentUser }) {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [campaignFilter, setCampaignFilter] = useState("all"); // تصفية حسب الكامبين
  // تحويل للقاعدة (تأشير متعدد)
  const [transferMode, setTransferMode] = useState(false);
  const [selectedT, setSelectedT] = useState({});
  const [transferMsg, setTransferMsg] = useState("");

  const statusOf = (c) => {
    if (c.payStatus && STATUS[c.payStatus]) return c.payStatus; // اختيار يدوي له الأولوية
    const a = Number(c.amount) || 0;
    const p = Number(c.paid) || 0;
    if (p <= 0) return "unpaid";
    if (p >= a) return "paid";
    return "partial";
  };
  const pubOf = (c) => (c.pubStatus === "published" ? "published" : "unpublished");

  // قائمة الكامبينات الموجودة بالمدفوعات
  const campaignNames = [...new Set(data.creators.map((c) => c.campaign).filter(Boolean))];

  const q = search.trim().toLowerCase();
  const list = data.creators.filter((c) => {
    const ps = statusOf(c);
    const pub = c.pubStatus === "published";
    const rem = (Number(c.amount) || 0) - (Number(c.paid) || 0);
    // تصفية الكامبين (مع تطبيع الفراغات حتى نتجنب اختلاف بسيط بالاسم)
    if (campaignFilter !== "all" && (c.campaign || "").trim() !== campaignFilter.trim()) return false;
    let passFilter = true;
    if (filter === "all") passFilter = true;
    else if (filter === "published") passFilter = pub;
    else if (filter === "unpublished") passFilter = !pub;
    else if (filter === "published_unpaid") passFilter = pub && rem > 0;
    else passFilter = ps === filter; // paid / partial / unpaid
    if (!passFilter) return false;
    if (!q) return true;
    return (
      (c.name || "").toLowerCase().includes(q) ||
      (c.handle || "").toLowerCase().includes(q) ||
      (c.phone || "").toLowerCase().includes(q) ||
      (c.superKey || "").toLowerCase().includes(q) ||
      (c.campaign || "").toLowerCase().includes(q)
    );
  });

  // تحويل المختارين للقاعدة الرئيسية
  const selTCount = Object.values(selectedT).filter(Boolean).length;
  const toggleT = (id) => setSelectedT((p) => ({ ...p, [id]: !p[id] }));
  const selectAllT = () => {
    const all = {};
    list.forEach((c) => (all[c.id] = true));
    setSelectedT(all);
  };
  const transferToDatabase = () => {
    const chosen = data.creators.filter((c) => selectedT[c.id]);
    if (chosen.length === 0) return;
    upd((d) => {
      const dbList = d.creatorsDB || [];
      let added = 0;
      chosen.forEach((c) => {
        // تجنّب التكرار: نفس الاسم أو نفس الرابط
        const exists = dbList.find(
          (x) => (x.handle && c.handle && x.handle === c.handle) || (x.name && c.name && x.name === c.name)
        );
        if (exists) {
          // حدّث آخر سعر إذا موجود
          if (Number(c.amount) > 0) exists.lastPrice = Number(c.amount) || 0;
        } else {
          dbList.unshift({
            id: "db" + Date.now() + Math.random().toString(36).slice(2, 6),
            name: c.name || "",
            handle: c.handle || "",
            phone: c.phone || "",
            followers: Number(c.followers) || 0,
            lastPrice: Number(c.amount) || 0,
            note: "",
          });
          added++;
        }
      });
      d.creatorsDB = dbList;
      return d;
    });
    setTransferMsg(`✓ حوّلت ${chosen.length} كريتور للقاعدة الرئيسية`);
    setTimeout(() => setTransferMsg(""), 3500);
    setTransferMode(false);
    setSelectedT({});
  };

  const blank = (defaultCampaign) => ({
    id: uid(),
    name: "",
    handle: "",
    phone: "",
    superKey: "",
    campaign: defaultCampaign || "",
    amount: "",
    paid: "",
    payStatus: "",
    pubStatus: "unpublished",
    pubLink: "",
    date: todayISO(),
    note: "",
  });

  const [importMsg, setImportMsg] = useState("");
  // استيراد كريتورز الكامبينات من الشيتات (يربط كل كريتور بكامبينه) — يفعّل نظام المفضلين
  const importCampaignCreators = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const incoming = JSON.parse(reader.result);
        const arr = Array.isArray(incoming) ? incoming : (incoming.creators || []);
        if (!arr.length) { setImportMsg("✕ الملف فارغ"); setTimeout(() => setImportMsg(""), 3000); return; }
        upd((d) => {
          d.creators = d.creators || [];
          // افهرس الموجود بـ (handle+campaign) حتى ما نكرر
          const norm = (h) => { const m = String(h || "").match(/instagram\.com\/([\w._]+)/) || String(h || "").match(/tiktok\.com\/@([\w._]+)/); return m ? m[1].toLowerCase() : String(h || "").toLowerCase(); };
          const seen = new Set(d.creators.map((c) => norm(c.handle) + "|" + (c.campaign || "").toLowerCase()));
          let added = 0;
          arr.forEach((it) => {
            const key = norm(it.handle) + "|" + (it.campaign || "").toLowerCase();
            if (it.handle && seen.has(key)) return; // نفس الكريتور بنفس الكامبين موجود
            seen.add(key);
            d.creators.push({
              id: "c" + Date.now() + Math.random().toString(36).slice(2, 7),
              name: it.name || "",
              handle: it.handle || "",
              phone: it.phone || "",
              followers: Number(it.followers) || 0,
              superKey: "",
              campaign: it.campaign || "",
              amount: it.amount ? (Number(String(it.amount).replace(/[^\d.]/g, "")) || 0) : 0,
              paid: 0,
              payStatus: "paid", // من الشيتات القديمة = مدفوعة ومكتملة
              pubStatus: "published",
              pubLink: "",
              date: it.date || todayISO(),
              note: it.province ? ("محافظة: " + it.province) : "",
            });
            added++;
          });
          // أضف الكريتورز للقاعدة بعد (مع المحافظة) إذا مو موجودين
          d.creatorsDB = d.creatorsDB || [];
          const dbSeen = new Set(d.creatorsDB.map((c) => norm(c.handle)));
          arr.forEach((it) => {
            const k = norm(it.handle);
            if (!it.handle || dbSeen.has(k)) return;
            dbSeen.add(k);
            d.creatorsDB.push({
              id: "db" + Date.now() + Math.random().toString(36).slice(2, 7),
              name: it.name || "", handle: it.handle || "", phone: it.phone || "",
              followers: Number(it.followers) || 0, lastPrice: it.amount ? String(it.amount).replace(/[^\d]/g, "") : "",
              province: it.province || "", note: "",
            });
          });
          window.setTimeout(() => { setImportMsg("✓ أُضيف " + added + " سجل كامبين — نظام المفضّلين والتكرار صار شغّال"); setTimeout(() => setImportMsg(""), 6000); }, 50);
          return d;
        });
      } catch (err) {
        setImportMsg("✕ الملف غير صالح");
        setTimeout(() => setImportMsg(""), 3000);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // تصدير/طباعة كشف كامبين كـ PDF (عن طريق نافذة طباعة نظيفة)
  const printCampaignReport = (campName) => {
    const rows = data.creators.filter((c) => (c.campaign || "") === campName);
    if (rows.length === 0) return;
    const stOf = (c) => {
      const a = Number(c.amount) || 0, p = Number(c.paid) || 0;
      if (c.payStatus === "paid" || (p > 0 && p >= a)) return "مدفوع";
      if (c.payStatus === "partial" || (p > 0 && p < a)) return "جزئي";
      return "باقي";
    };
    const totalDue = rows.reduce((s, c) => s + (Number(c.amount) || 0), 0);
    const totalPaid = rows.reduce((s, c) => s + (Number(c.paid) || 0), 0);
    const published = rows.filter((c) => c.pubStatus === "published").length;
    const today = new Date().toLocaleDateString("ar-IQ");
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    const rowsHtml = rows.map((c, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${esc(c.name) || "—"}</td>
        <td class="ltr">${esc(c.handle) || "—"}</td>
        <td>${c.pubStatus === "published" ? "نشر ✓" : "ما نشر"}</td>
        <td>${stOf(c)}</td>
        <td class="num">${fmt(c.amount)}</td>
        <td class="num">${fmt(c.paid)}</td>
        <td class="num">${fmt((Number(c.amount) || 0) - (Number(c.paid) || 0))}</td>
      </tr>`).join("");
    const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>كشف كامبين ${esc(campName)}</title>
    <style>
      * { font-family: 'Segoe UI', Tahoma, sans-serif; box-sizing: border-box; }
      body { padding: 32px; color: #1a1a1a; }
      .head { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #0A4A42; padding-bottom: 16px; margin-bottom: 8px; }
      .brand { font-size: 22px; font-weight: 800; color: #0A4A42; }
      .brand small { display: block; font-size: 12px; color: #888; font-weight: 400; }
      h1 { font-size: 19px; margin: 18px 0 4px; color: #0A4A42; }
      .meta { color: #666; font-size: 13px; margin-bottom: 18px; }
      .summary { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
      .scard { background: #F2FBF9; border: 1px solid #D6F0EA; border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 130px; }
      .scard .v { font-size: 20px; font-weight: 800; color: #0A4A42; }
      .scard .l { font-size: 12px; color: #666; margin-top: 2px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { background: #0A4A42; color: #fff; padding: 9px 8px; text-align: right; font-weight: 600; }
      td { padding: 8px; border-bottom: 1px solid #eee; }
      .num { text-align: left; font-variant-numeric: tabular-nums; }
      .ltr { direction: ltr; text-align: right; font-size: 11px; color: #0F6E56; }
      tr:nth-child(even) td { background: #FAFAF8; }
      tfoot td { font-weight: 800; background: #E1F5EE !important; border-top: 2px solid #0A4A42; }
      .foot { margin-top: 28px; font-size: 11px; color: #aaa; text-align: center; }
      @media print { body { padding: 12px; } .noprint { display: none; } }
      .btn { background: #0A4A42; color:#fff; border:none; padding:10px 22px; border-radius:8px; font-size:14px; cursor:pointer; }
    </style></head><body>
      <div class="head">
        <div class="brand">UGC Iraq<small>المالية الداخلية — كشف كامبين</small></div>
        <div style="text-align:left; font-size:13px; color:#666;">التاريخ: ${today}</div>
      </div>
      <h1>كامبين: ${esc(campName)}</h1>
      <div class="meta">${rows.length} كريتور · ${published} نشروا الفيديو</div>
      <div class="summary">
        <div class="scard"><div class="v">${fmt(totalDue)}</div><div class="l">إجمالي المستحق</div></div>
        <div class="scard"><div class="v">${fmt(totalPaid)}</div><div class="l">المدفوع</div></div>
        <div class="scard"><div class="v">${fmt(totalDue - totalPaid)}</div><div class="l">الباقي</div></div>
      </div>
      <table>
        <thead><tr><th>#</th><th>الاسم</th><th>الحساب</th><th>النشر</th><th>الدفع</th><th>المستحق</th><th>المدفوع</th><th>الباقي</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
        <tfoot><tr><td colspan="5">الإجمالي</td><td class="num">${fmt(totalDue)}</td><td class="num">${fmt(totalPaid)}</td><td class="num">${fmt(totalDue - totalPaid)}</td></tr></tfoot>
      </table>
      <div class="noprint" style="text-align:center; margin-top:24px;">
        <button class="btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
      </div>
      <div class="foot">UGC Iraq — تم الإنشاء من نظام المالية الداخلية</div>
    </body></html>`;
    const w = window.open("", "_blank");
    if (w) { w.document.write(html); w.document.close(); }
    else alert("المتصفح منع فتح نافذة الطباعة. اسمح بالنوافذ المنبثقة وجرّب مرة ثانية.");
  };

  const setPayStatus = (id, val) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === id);
      if (i >= 0) {
        d.creators[i].payStatus = val;
        // لو صار مدفوع، اجعل المدفوع = المستحق؛ لو رجع غير مدفوع، صفّر المدفوع
        if (val === "paid") d.creators[i].paid = d.creators[i].amount;
        else if (val === "unpaid") d.creators[i].paid = 0;
      }
      return d;
    });

  const setPubStatus = (id, val) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === id);
      if (i >= 0) {
        d.creators[i].pubStatus = val;
        if (val === "unpublished") d.creators[i].pubLink = ""; // امسح الرابط إذا رجع غير منشور
      }
      return d;
    });

  const save = (rec) => {
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === rec.id);
      if (i >= 0) d.creators[i] = rec;
      else d.creators.unshift(rec);
      return d;
    });
    setEditing(null);
  };

  const del = (id) => {
    const c = data.creators.find((x) => x.id === id);
    if (c) softDelete("creator", c, `حُذف الكريتور «${c.name || c.handle || "بدون اسم"}»`);
  };

  const markPaid = (c) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === c.id);
      if (i >= 0) d.creators[i].paid = d.creators[i].amount;
      return d;
    });

  // تصفير كل الدفعات: يمسح كل سجلات مدفوعات الكريتورز (مع نسخة بسلة المحذوفات احتياطاً)
  // حفظ تاريخ الكامبينات والأسعار من المدفوعات إلى قاعدة الكريتورز (نظام دائم منفصل)
  // هذا يخلّي قوائم المفضلين والتكرار والمحافظات مرتبطة بالقاعدة — ما تنمسح بتصفير الدفعات
  const snapshotToDatabase = (silent) => {
    const norm = (s) => {
      const h = String(s || "").trim().toLowerCase();
      const m = h.match(/instagram\.com\/([\w._]+)/) || h.match(/tiktok\.com\/@([\w._]+)/);
      return m ? m[1] : h;
    };
    let filled = 0;
    upd((d) => {
      // اجمع تاريخ كل كريتور من المدفوعات
      const hist = {};
      (d.creators || []).forEach((c) => {
        const k = norm(c.handle) || ("name:" + String(c.name || "").toLowerCase().trim());
        if (!k || k === "name:") return;
        if (!hist[k]) hist[k] = { campaigns: new Set(), prices: [], province: "", name: c.name || "", handle: c.handle || "", phone: c.phone || "", followers: c.followers || 0 };
        const e = hist[k];
        if (c.campaign) e.campaigns.add(c.campaign);
        if (Number(c.amount) > 0) e.prices.push({ price: Number(c.amount), date: c.date || "", campaign: c.campaign || "" });
        const note = c.note || "";
        if (note.includes("محافظة:") && !e.province) e.province = note.split("محافظة:")[1].trim();
      });
      // اكتب التاريخ بالقاعدة (دمج مع الموجود)
      const dbByKey = {};
      (d.creatorsDB || []).forEach((r) => {
        const k = norm(r.handle) || ("name:" + String(r.name || "").toLowerCase().trim());
        if (k && k !== "name:") dbByKey[k] = r;
      });
      Object.entries(hist).forEach(([k, e]) => {
        if (dbByKey[k]) {
          // ادمج الكامبينات مع الموجودة بالقاعدة
          const existing = new Set(dbByKey[k].campaigns || []);
          e.campaigns.forEach((cn) => existing.add(cn));
          dbByKey[k].campaigns = Array.from(existing);
          dbByKey[k].priceHistory = e.prices.length ? e.prices : (dbByKey[k].priceHistory || []);
          if (!dbByKey[k].province && e.province) dbByKey[k].province = e.province;
          if (e.campaigns.size) filled++;
        } else {
          // كريتور بالمدفوعات مو بالقاعدة — أضفه للقاعدة
          d.creatorsDB = d.creatorsDB || [];
          d.creatorsDB.push({ id: "d" + Date.now() + Math.random().toString(36).slice(2, 6), name: e.name, handle: e.handle, phone: e.phone, followers: Number(e.followers) || 0, lastPrice: e.prices.length ? e.prices[e.prices.length - 1].price : "", province: e.province, note: "", campaigns: Array.from(e.campaigns), priceHistory: e.prices });
          if (e.campaigns.size) filled++;
        }
      });
      return d;
    });
    if (!silent) {
      setImportMsg(`✓ انحفظ تاريخ ${filled} كريتور بالقاعدة (المفضلين والتكرار صاروا دائمين)`);
      setTimeout(() => setImportMsg(""), 6000);
    }
    return filled;
  };

  const clearAllPayments = () => {
    const count = data.creators.length;
    if (count === 0) { setImportMsg("ماكو دفعات لتصفيرها"); setTimeout(() => setImportMsg(""), 3000); return; }
    if (!window.confirm(`متأكد تريد تصفير كل المدفوعات؟ راح تنمسح ${count} سجل دفعة.\n\n✓ راح أحفظ تاريخ الكامبينات بالقاعدة أول — فقوائم المفضلين والتكرار والمحافظات ما تنمسح.\n✓ قاعدة الكريتورز والكامبينات ما تتأثر — بس سجلات المدفوعات تنمسح.`)) return;
    // احفظ التاريخ بالقاعدة قبل المسح (حتى ما تروح قوائم المفضلين)
    snapshotToDatabase(true);
    upd((d) => {
      d.trash = d.trash || [];
      d.trash.unshift({ id: "bulk" + Date.now(), kind: "bulkCreators", label: `تصفير ${count} دفعة`, items: d.creators.slice(), at: Date.now() });
      d.creators = [];
      return d;
    });
    setImportMsg(`✓ تم تصفير ${count} دفعة (التاريخ محفوظ بالقاعدة + نسخة بالسلة)`);
    setTimeout(() => setImportMsg(""), 6000);
  };

  // حذف كامبين مخصص: يمسح كل سجلات هذا الكامبين + يشيله من قائمة الكامبينات (مع نسخة بالسلة)

    const inCamp = data.creators.filter((c) => (c.campaign || "").trim() === campName.trim());
    if (!window.confirm(`متأكد تريد حذف كامبين «${campName}»؟\nراح تنحذف ${inCamp.length} سجل دفعة مرتبط بيه.\n\n(محفوظة بالسلة احتياطاً — تگدر تترجعها)`)) return;
    upd((d) => {
      d.trash = d.trash || [];
      if (inCamp.length) d.trash.unshift({ id: "camp" + Date.now(), kind: "bulkCreators", label: `حذف كامبين «${campName}» (${inCamp.length} سجل)`, items: inCamp.slice(), at: Date.now() });
      d.creators = d.creators.filter((c) => (c.campaign || "").trim() !== campName.trim());

    setCampaignFilter("all");
    setImportMsg(`✓ انحذف كامبين «${campName}» (${inCamp.length} سجل محفوظ بالسلة)`);
    setTimeout(() => setImportMsg(""), 6000);
  };

  return (

        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>

          <label style={S.ghostBtn}>
            📥 استيراد كريتورز الكامبينات
            <input type="file" accept=".json" onChange={importCampaignCreators} style={{ display: "none" }} />

          <button style={{ ...S.ghostBtn, color: "#0F6E56", borderColor: "#BCE3D9", display: isStaff ? "none" : undefined }} onClick={() => snapshotToDatabase(false)} title="يحفظ تاريخ الكامبينات بالقاعدة — فقوائم المفضلين والتكرار تصير دائمة">

          <button style={{ ...S.ghostBtn, color: "#A32D2D", borderColor: "#E8C4C4", display: isStaff ? "none" : undefined }} onClick={clearAllPayments} title="يمسح كل سجلات المدفوعات (القاعدة والكامبينات والتاريخ ما تتأثر)">

          </button>
          <button style={S.primaryBtn} onClick={() => setEditing(blank())}>

        </div>
      </div>

      <div style={S.searchWrap}>
        <span style={S.searchIcon}>🔍</span>
        <input

      {q && (

      {q && list.length > 0 && (

                            <button

                    <td style={S.tdAct}>
                      <div style={S.actGroup}>
                        <button style={S.iconBtn} onClick={() => setEditing(c)}>
                          ✎

                        <button style={S.iconBtnDanger} onClick={() => del(c.id)}>
                          ✕
                        </button>
                      </div>
                    </td>

                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {editing && (
        <Modal title={data.creators.find((x) => x.id === editing.id) ? "تعديل كريتور" : "كريتور جديد"} onClose={() => setEditing(null)}>

        </Modal>
      )}
    </div>
  );
}

function CampaignsTab({ data, upd, partnerTotals, softDelete }) {
  const [editing, setEditing] = useState(null);

  const blank = () => ({
    id: uid(),
    name: "",
    client: "",
    revenue: "",
    cost: "",
    date: todayISO(),
    splits: [],
  });

  const save = (rec) => {
    upd((d) => {
      const i = d.campaigns.findIndex((x) => x.id === rec.id);
      if (i >= 0) d.campaigns[i] = rec;
      else d.campaigns.unshift(rec);
      return d;
    });
    setEditing(null);
  };

  const del = (id) => {
    const c = data.campaigns.find((x) => x.id === id);
    if (c) softDelete("campaign", c, `حُذف الكامبين «${c.name || "بدون اسم"}»`);
  };

  // إضافة أسماء كل الكامبينات من شيتات الدرايف دفعة وحدة (بدون تكرار الموجود)
  const [seedMsg, setSeedMsg] = useState("");
  const seedCampaignNames = () => {

function CampaignForm({ rec, onSave, onCancel }) {

  const profit = (Number(r.revenue) || 0) - (Number(r.cost) || 0);

  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState({});

  const [assign, setAssign] = useState({ campaign: "", amount: "" });

  const [blForm, setBlForm] = useState(null); // {name, handle, reason, addedBy} لمودال البلاك ليست
  const [historyOf, setHistoryOf] = useState(null); // كريتور لعرض سجله

  // شرائح فلتر المتابعين
  const FOLLOWER_TIERS = [
    { id: "all", label: "الكل", min: 0, max: Infinity },
    { id: "u10", label: "أقل من 10K", min: 0, max: 10000 },
    { id: "10-50", label: "10K–50K", min: 10000, max: 50000 },

    { id: "100-500", label: "100K–500K", min: 100000, max: 500000 },
    { id: "500+", label: "أكثر من 500K", min: 500000, max: Infinity },
  ];

  const resetForm = () => setForm({ name: "", handle: "", phone: "", followers: "", lastPrice: "", province: "", note: "" });

  const saveCreator = () => {
    if (!form.name.trim() && !form.handle.trim()) {
      setMsg("اكتب اسم أو رابط على الأقل");
      setTimeout(() => setMsg(""), 2500);
      return;
    }
    if (editId) {
      upd((d) => {
        const c = (d.creatorsDB || []).find((x) => x.id === editId);
        if (c) {
          c.name = form.name.trim();
          c.handle = form.handle.trim();
          c.phone = form.phone.trim();
          c.followers = Number(form.followers) || 0;
          c.lastPrice = Number(form.lastPrice) || 0;
          c.province = (form.province || "").trim();
          c.note = form.note.trim();
        }
        return d;
      });
      setEditId(null);
    } else {
      const item = {
        id: "db" + Date.now() + Math.random().toString(36).slice(2, 6),
        name: form.name.trim(),
        handle: form.handle.trim(),
        phone: form.phone.trim(),
        followers: Number(form.followers) || 0,
        lastPrice: Number(form.lastPrice) || 0,
        province: (form.province || "").trim(),
        note: form.note.trim(),
      };
      upd((d) => {
        d.creatorsDB = [item, ...(d.creatorsDB || [])];
        return d;
      });
    }
    resetForm();
    setAdding(false);
  };

  const startEdit = (c) => {
    setForm({ name: c.name || "", handle: c.handle || "", phone: c.phone || "", followers: c.followers || "", lastPrice: c.lastPrice || "", province: c.province || "", note: c.note || "" });
    setEditId(c.id);
    setAdding(true);
  };

  const removeCreator = (id) => {
    const c = (data.creatorsDB || []).find((x) => x.id === id);
    if (c) softDelete("creatorDB", c, `حُذف «${c.name || c.handle || "بدون اسم"}» من القاعدة`);
  };

  // استيراد قائمة كريتورز ودمجها مع القاعدة (بدون مسح الموجود) — تطابق بالرابط/الاسم
  const importToDatabase = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        let parsed = JSON.parse(reader.result);
        // اقبل إما مصفوفة مباشرة أو كائن فيه creatorsDB
        const incoming = Array.isArray(parsed) ? parsed : (parsed.creatorsDB || parsed.creators || []);
        if (!Array.isArray(incoming) || incoming.length === 0) {
          setMsg("✕ الملف ما فيه قائمة كريتورز");
          setTimeout(() => setMsg(""), 3000);
          return;
        }
        const uname = (h) => {
          const m = String(h || "").match(/instagram\.com\/([\w._]+)/i) || String(h || "").match(/tiktok\.com\/@([\w._]+)/i);
          return m ? m[1].toLowerCase() : "";
        };
        upd((d) => {
          const existing = d.creatorsDB || [];
          // فهرس الموجود بالرابط والاسم
          const byKey = {};
          existing.forEach((c) => {
            const k = uname(c.handle) || ("name:" + (c.name || "").toLowerCase().trim());
            if (k) byKey[k] = c;
          });
          let added = 0, merged = 0;
          incoming.forEach((it) => {
            const handle = it.handle || it.link || "";
            const name = it.name || "";
            const k = uname(handle) || ("name:" + name.toLowerCase().trim());
            if (!k) return;
            if (byKey[k]) {
              // دمج: كمّل الناقص فقط
              const ex = byKey[k];
              if ((!ex.followers || ex.followers === 0) && it.followers) ex.followers = Number(it.followers) || 0;
              if (!ex.lastPrice && (it.lastPrice || it.cost)) ex.lastPrice = it.lastPrice || it.cost;
              if (!ex.phone && it.phone) ex.phone = it.phone;
              if (!ex.note && it.note) ex.note = it.note;
              merged++;
            } else {
              const rec = {
                id: "d" + Date.now() + Math.random().toString(36).slice(2, 7),
                name: name,
                handle: handle,
                phone: it.phone || "",
                followers: Number(it.followers) || 0,
                lastPrice: it.lastPrice || it.cost || "",
                note: it.note || "",
              };
              existing.push(rec);
              byKey[k] = rec;
              added++;
            }
          });
          d.creatorsDB = existing;
          window.setTimeout(() => {
            setMsg(`✓ أُضيف ${added} كريتور جديد` + (merged ? ` ودُمج ${merged} موجود` : ""));
            setTimeout(() => setMsg(""), 5000);
          }, 50);
          return d;
        });
      } catch (err) {
        setMsg("✕ الملف غير صالح");
        setTimeout(() => setMsg(""), 3000);
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // اسمح بإعادة رفع نفس الملف
  };

  // تصدير قائمة القاعدة كـ PDF (نافذة طباعة نظيفة) — يطبع القائمة المفلترة الحالية
  const printDatabaseList = () => {
    const rows = list.map((c, i) => {
      const st = statOf(c);
      const fav = st && st.campaignCount >= 3 ? "⭐" : "";
      return `<tr>
        <td>${i + 1}</td>
        <td>${(c.name || "—")} ${fav}</td>
        <td style="direction:ltr;text-align:left">${c.handle || "—"}</td>
        <td>${c.followers ? Number(c.followers).toLocaleString("en-US") : "—"}</td>
        <td>${c.lastPrice ? "$" + c.lastPrice : "—"}</td>
        <td>${c.province || "—"}</td>
        <td style="direction:ltr;text-align:left">${c.phone || "—"}</td>
      </tr>`;
    }).join("");
    const win = window.open("", "_blank");
    if (!win) return;
    win.document.write(`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>قائمة الكريتورز - UGC Iraq</title>
      <style>
        *{font-family:'Segoe UI',Tahoma,Arial,sans-serif;box-sizing:border-box}
        body{padding:32px;color:#1a1a1a}
        .head{display:flex;align-items:center;gap:12px;border-bottom:3px solid #0F9E8E;padding-bottom:16px;margin-bottom:20px}

      </style></head><body>
      <div class="head"><div class="logo">UGC</div><div><h1>قائمة الكريتورز</h1><div class="sub">UGC Iraq — ${list.length} كريتور — ${new Date().toLocaleDateString("ar-IQ")}</div></div></div>
      <table><thead><tr><th>#</th><th>الاسم</th><th>الحساب</th><th>المتابعين</th><th>السعر</th><th>المحافظة</th><th>الموبايل</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="foot">UGC Iraq · ugciraq.com · @ugc.iraq</div>

      </body></html>`);
    win.document.close();
  };

  const q = search.trim().toLowerCase();
  const tier = FOLLOWER_TIERS.find((t) => t.id === followersFilter) || FOLLOWER_TIERS[0];
  const statOf = (c) => creatorStats && creatorStats.byKey[creatorStats.norm(c.handle) || ("name:" + (c.name || "").toLowerCase().trim())];
  const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;
  let list = db.filter((c) => {
    if (q && !((c.name || "").toLowerCase().includes(q) || (c.handle || "").toLowerCase().includes(q))) return false;
    const f = Number(c.followers) || 0;
    if (followersFilter !== "all" && !(f >= tier.min && f < tier.max)) return false;
    if (specialFilter === "favorites") {
      const st = statOf(c);
      if (!st || st.campaignCount < 3) return false;
    } else if (specialFilter === "available") {
      // متاح = ما اشتغل وياك آخر أسبوعين
      const st = statOf(c);
      if (st && st.lastDate) {
        const last = new Date(st.lastDate);
        if (!isNaN(last) && Date.now() - last.getTime() < TWO_WEEKS) return false;
      }
    }
    return true;
  });
  // ترتيب
  if (sortBy === "followers_desc") list = [...list].sort((a, b) => (Number(b.followers) || 0) - (Number(a.followers) || 0));
  else if (sortBy === "followers_asc") list = [...list].sort((a, b) => (Number(a.followers) || 0) - (Number(b.followers) || 0));
  else if (sortBy === "price_desc") list = [...list].sort((a, b) => (Number(b.lastPrice) || 0) - (Number(a.lastPrice) || 0));
  else if (sortBy === "name") list = [...list].sort((a, b) => (a.name || "").localeCompare(b.name || "", "ar"));
  else if (sortBy === "most_active") list = [...list].sort((a, b) => ((statOf(b) || {}).campaignCount || 0) - ((statOf(a) || {}).campaignCount || 0));

  const selCount = Object.values(selected).filter(Boolean).length;
  const toggleSel = (id) => setSelected((p) => ({ ...p, [id]: !p[id] }));
  const selectAll = () => {
    const all = {};
    list.forEach((c) => (all[c.id] = true));
    setSelected(all);
  };
  const clearSel = () => setSelected({});

  const addSelectedToCampaign = () => {
    if (!assign.campaign.trim()) {
      setMsg("اكتب اسم الكامبين");
      setTimeout(() => setMsg(""), 2500);
      return;
    }
    let chosen = db.filter((c) => selected[c.id]);
    // استبعد المحظورين (البلاك ليست) مع تنبيه
    const blocked = chosen.filter((c) => isBlacklisted && isBlacklisted(c.handle, c.name));
    if (blocked.length) {
      const names = blocked.map((c) => c.name || c.handle).join("، ");
      if (!window.confirm(`⚠️ في ${blocked.length} كريتور بالبلاك ليست (${names}). راح ينحذفون من الإضافة. تكمّل بالباقي؟`)) return;
      chosen = chosen.filter((c) => !(isBlacklisted && isBlacklisted(c.handle, c.name)));
    }
    if (!chosen.length) {
      setMsg("✕ كلهم بالبلاك ليست — ماكو أحد ينضاف");
      setTimeout(() => setMsg(""), 3000);
      return;
    }
    const amt = Number(assign.amount) || 0;
    const newOnes = chosen.map((c) => ({
      id: "c" + Date.now() + Math.random().toString(36).slice(2, 6),
      name: c.name,
      handle: c.handle,
      phone: c.phone || "",
      followers: Number(c.followers) || 0,
      superKey: "",
      campaign: assign.campaign.trim(),
      amount: amt || Number(c.lastPrice) || 0,
      paid: 0,
      payStatus: "unpaid",
      pubStatus: "unpublished",
      pubLink: "",
      date: todayISO(),
      note: "",
    }));
    upd((d) => {
      d.creators = [...newOnes, ...(d.creators || [])];
      return d;
    });
    setMsg("\u2713 \u0623\u0636\u0641\u062a " + chosen.length + " \u0643\u0631\u064a\u062a\u0648\u0631 \u0644\u0643\u0627\u0645\u0628\u064a\u0646 \u00ab" + assign.campaign.trim() + "\u00bb");
    setTimeout(() => setMsg(""), 3500);
    setShowAssign(false);
    setSelectMode(false);
    clearSel();
    setAssign({ campaign: "", amount: "" });

          <button style={S.secondaryBtn} onClick={() => setSelectMode(true)} disabled={db.length === 0}>

          <>
            <button style={S.primaryBtn} onClick={() => setShowAssign(true)} disabled={selCount === 0}>

            <button style={S.secondaryBtn} onClick={selectAll}>اختر الكل</button>

        <button style={S.ghostBtn} onClick={printDatabaseList} disabled={list.length === 0}>🖨️ تصدير PDF</button>
        {msg && <span style={{ fontSize: 13, fontWeight: 600, color: msg.startsWith("\u2713") ? "#0F6E56" : "#A32D2D" }}>{msg}</span>}
      </div>

      {adding && (
        <div style={S.modalOverlay} onClick={() => { setAdding(false); setEditId(null); resetForm(); }}>
          <div style={{ ...S.modalCard, maxWidth: 560 }} onClick={(e) => e.stopPropagation()}>
            <div style={S.panelTitle}>{editId ? "تعديل كريتور" : "كريتور جديد للقاعدة"}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10, marginTop: 8 }}>
              <input style={S.input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="الاسم" />
              <input style={{ ...S.input, direction: "ltr", textAlign: "left" }} value={form.handle} onChange={(e) => setForm({ ...form, handle: e.target.value })} placeholder="رابط الحساب أو @username" />
              <input style={{ ...S.input, direction: "ltr", textAlign: "left" }} value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} placeholder="رقم الموبايل (واتساب)" />
              <input style={S.input} type="number" value={form.followers} onChange={(e) => setForm({ ...form, followers: e.target.value })} placeholder="عدد المتابعين" />
              <input style={S.input} type="number" value={form.lastPrice} onChange={(e) => setForm({ ...form, lastPrice: e.target.value })} placeholder="آخر سعر (اختياري)" />
              <input style={S.input} value={form.province} onChange={(e) => setForm({ ...form, province: e.target.value })} placeholder="المحافظة (اختياري)" list="iq-provinces" />
              <datalist id="iq-provinces">
                {["بغداد", "البصرة", "نينوى", "أربيل", "النجف", "كربلاء", "كركوك", "بابل", "الأنبار", "ذي قار", "ديالى", "السليمانية", "واسط", "صلاح الدين", "القادسية", "ميسان", "المثنى", "دهوك", "حلبجة"].map((p) => <option key={p} value={p} />)}
              </datalist>
              <input style={{ ...S.input, gridColumn: "1 / -1" }} value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} placeholder="ملاحظة (اختياري)" />

            </div>
          </div>

      {list.length === 0 ? (
        <div style={S.emptyState}>

        </div>

        <div style={S.tableWrap}>
          <table style={S.table}>

              <tr>
                {selectMode && <th style={{ ...S.th, width: 40 }}></th>}

                <th style={S.th}>المحافظة</th>
                <th style={S.th}>ملاحظة</th>
                <th style={{ ...S.th, width: 90 }}></th>
              </tr>
            </thead>
            <tbody>
              {list.map((c) => (
                <tr key={c.id} style={{ ...S.tr, ...(selectMode && selected[c.id] ? { background: "#F2FBF9" } : {}) }}>

                      {(() => {
                        const st = creatorStats && creatorStats.byKey[creatorStats.norm(c.handle) || ("name:" + (c.name || "").toLowerCase().trim())];
                        const bl = isBlacklisted && isBlacklisted(c.handle, c.name);
                        return (
                          <>

                            {st && st.campaignCount === 2 && <span style={S.badgeGood} title="اشتغل وياك كامبينين">×2</span>}
                            {st && st.thisMonthCount >= 2 && <span style={S.badgeWarn} title={`اشتغل وياك ${st.thisMonthCount} مرات هذا الشهر`}>⚠️ {st.thisMonthCount} هذا الشهر</span>}
                          </>
                        );
                      })()}
                    </div>
                  </td>
                  <td style={S.td}>
                    {c.handle ? (

                      <span style={{ color: "#C4C2BB" }}>—</span>

                        <span style={{ fontSize: 13 }}>🟢</span> {c.phone}
                      </a>

                      "—"

                  <td style={S.tdNum}>{c.followers ? fmtFollowers(c.followers) : "—"}</td>
                  <td style={S.tdNum}>{c.lastPrice ? fmt(c.lastPrice) : "—"}</td>
                  <td style={S.tdMuted}>{c.province || "—"}</td>
                  <td style={S.tdMuted}>{c.note || "—"}</td>

                      <button style={S.iconBtnDanger} onClick={() => setBlForm({ name: c.name || "", handle: c.handle || "", reason: "", addedBy: "" })} title="أضف للبلاك ليست">🚫</button>
                      <button style={S.iconBtnDanger} onClick={() => removeCreator(c.id)} title="حذف">✕</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showAssign && (
        <div style={S.modalOverlay} onClick={() => setShowAssign(false)}>
          <div style={S.modalCard} onClick={(e) => e.stopPropagation()}>
            <div style={S.panelTitle}>أضف {selCount} كريتور لكامبين</div>
            <p style={{ fontSize: 13, color: "#888780", margin: "0 0 14px", lineHeight: 1.6 }}>
              راح ينضافون لتبويب «مدفوعات الكريتورز» باسم الكامبين والسعر اللي تحدده. تگدر تعدّل سعر كل واحد بعدين من هناك.
            </p>
            <div style={{ marginBottom: 10 }}>
              <label style={S.fieldLabel}>اسم الكامبين</label>
              <input style={S.input} value={assign.campaign} onChange={(e) => setAssign({ ...assign, campaign: e.target.value })} placeholder="مثلاً: Babarooti" list="campaign-list-db" />
              <datalist id="campaign-list-db">
                {[...new Set((data.campaigns || []).map((c) => c.name).concat((data.creators || []).map((c) => c.campaign)))].filter(Boolean).map((n, i) => (
                  <option key={i} value={n} />
                ))}
              </datalist>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={S.fieldLabel}>السعر لكل كريتور (تگدر تخليه صفر وتعدّله بعدين)</label>
              <input style={S.input} type="number" value={assign.amount} onChange={(e) => setAssign({ ...assign, amount: e.target.value })} placeholder="0" />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={S.primaryBtn} onClick={addSelectedToCampaign}>أضفهم للكامبين</button>
              <button style={S.ghostBtn} onClick={() => setShowAssign(false)}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {/* مودال سجل الكريتور — كل كامبيناته وأسعاره */}
      {historyOf && (() => {
        const st = creatorStats && creatorStats.byKey[creatorStats.norm(historyOf.handle) || ("name:" + (historyOf.name || "").toLowerCase().trim())];
        const bl = isBlacklisted && isBlacklisted(historyOf.handle, historyOf.name);
        return (
          <div style={S.modalOverlay} onClick={() => setHistoryOf(null)}>
            <div style={{ ...S.modalCard, maxWidth: 540 }} onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
                <div style={S.panelTitle}>📋 سجل: {historyOf.name || historyOf.handle || "كريتور"}</div>
                <button style={S.iconBtn} onClick={() => setHistoryOf(null)}>✕</button>
              </div>
              {historyOf.handle && (
                <a href={toUrl(historyOf.handle)} target="_blank" rel="noopener noreferrer" style={{ ...S.cHandleLink, display: "block", marginBottom: 12 }}>{historyOf.handle}</a>
              )}
              {bl && <div style={{ ...S.alertRow, background: "#FCEBEA", borderColor: "#F0C8C5", marginBottom: 12 }}>🚫 هذا الكريتور بالبلاك ليست — السبب: {bl.reason || "غير مذكور"}</div>}

              <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                <div style={S.statMini}><div style={S.statMiniNum}>{st ? st.campaignCount : 0}</div><div style={S.statMiniLbl}>كامبين</div></div>
                <div style={S.statMini}><div style={S.statMiniNum}>{st ? st.thisMonthCount : 0}</div><div style={S.statMiniLbl}>هذا الشهر</div></div>
                <div style={S.statMini}><div style={S.statMiniNum}>{st && st.prices.length ? fmt(st.prices[st.prices.length - 1].price) : (historyOf.lastPrice ? fmt(historyOf.lastPrice) : "—")}</div><div style={S.statMiniLbl}>آخر سعر</div></div>
