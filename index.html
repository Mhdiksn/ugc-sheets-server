<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UGC Iraq — المالية الداخلية</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FBFAF7; }
  #root { min-height: 100vh; }
  #boot { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; color: #0A4A42; flex-direction: column; gap: 16px; text-align: center; padding: 20px; }
  #boot .mark { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #0F9E8E 0%, #0A4A42 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
  #boot .spin { width: 28px; height: 28px; border: 3px solid #E1F5F2; border-top-color: #0F9E8E; border-radius: 50%; animation: bootspin 0.8s linear infinite; }
  #boot .err { color: #A32D2D; font-size: 14px; max-width: 400px; line-height: 1.6; }
  @keyframes bootspin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root">
  <div id="boot">
    <div class="mark">UGC</div>
    <div class="spin"></div>
    <div>يحمّل التطبيق...</div>
  </div>
</div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useCallback, useRef } = React;


// ============================================================================
// UGC Iraq — لوحة المالية الداخلية
// نظام موحد لتتبّع: مدفوعات الكريتورز · أرباح الكامبينات والتوزيع · الصرفيات
// البيانات تُحفظ تلقائياً وتبقى محفوظة حتى بعد إغلاق المتصفح.
// ============================================================================

const PIN = "2024"; // كلمة سر الادمنز — تكدر تغيرها بأي وقت

// ---- أدوات مساعدة ----------------------------------------------------------
const fmt = (n) =>
  new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(
    Math.round(Number(n) || 0)
  );

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

const todayISO = () => new Date().toISOString().slice(0, 10);

const STATUS = {
  paid: { label: "مدفوع", c: "#1D9E75", bg: "#E1F5EE", t: "#0F6E56" },
  partial: { label: "جزئي", c: "#BA7517", bg: "#FAEEDA", t: "#854F0B" },
  unpaid: { label: "باقي", c: "#E24B4A", bg: "#FCEBEB", t: "#A32D2D" },
};

const PUB_STATUS = {
  published: { label: "تم النشر", c: "#1D9E75", bg: "#E1F5EE", t: "#0F6E56" },
  unpublished: { label: "لم يُنشر", c: "#888780", bg: "#F1EFE8", t: "#5F5E5A" },
};

// تلوين قوائم الحالة حسب القيمة
function statusSelectStyle(key) {
  const s = STATUS[key] || STATUS.unpaid;
  return { background: s.bg, color: s.t, borderColor: s.bg };
}
function pubSelectStyle(key) {
  const s = PUB_STATUS[key] || PUB_STATUS.unpublished;
  return { background: s.bg, color: s.t, borderColor: s.bg };
}

// ---- التخزين الدائم --------------------------------------------------------
const STORE_KEY = "ugc_finance_v1";

async function loadAll() {
  try {
    const v = localStorage.getItem(STORE_KEY);
    if (v) return JSON.parse(v);
  } catch (e) {
    /* مفتاح غير موجود بعد — طبيعي بأول استخدام */
  }
  return null;
}

async function saveAll(data) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    return false;
  }
}

// ---- بيانات افتراضية فارغة -------------------------------------------------
const EMPTY = {
  creators: [], // {id, name, handle, phone, superKey, campaign, amount, paid, payStatus, pubStatus, pubLink, date, note}
  campaigns: [], // {id, name, client, revenue, cost, date, splits:[{name, pct}]}
  expenses: [], // {id, label, amount, type:'company'|'personal', date, note}
  capital: 0, // رأس مال / رصيد الشركة الابتدائي
  serverUrl: "", // رابط الخادم الوسيط لقراءة Google Sheets (اختياري)
  conversations: [], // محادثات المساعد: {id, title, messages:[], apiHistory:[], model, createdAt}
  activeConvId: null, // المحادثة المفتوحة حالياً
  defaultModel: "claude-sonnet-4-6", // الموديل الافتراضي للمحادثات الجديدة
};

// الموديلات المتوفرة عن طريق الـ API
const MODELS = [
  { id: "claude-opus-4-6", name: "Opus", desc: "الأقوى والأذكى — للمهام المعقّدة", badge: "أقوى" },
  { id: "claude-sonnet-4-6", name: "Sonnet", desc: "متوازن — ذكي وسريع (موصى به)", badge: "متوازن" },
  { id: "claude-haiku-4-5-20251001", name: "Haiku", desc: "الأسرع والأرخص — للمهام البسيطة", badge: "أسرع" },
];

const WELCOME_TEXT =
  "هلا! آني مساعدك الذكي لكل شي بالتطبيق. تكدر تحجي وياي عادي وآني أسوي:\n\n• أضيف كريتور جديد وأملّي بياناته (روابط، أرقام، سوبر كي، سعر) من كلامك\n• أعدّل أي كريتور أو كامبين أو صرفية موجودة\n• أسجّل دفعات — تكتبلي أو تلصق سكرين شوت التحويل من Super Qi\n• أقرا شيت كامبين من رابط Google Sheets منشور، أحسب التكلفة من المعتمدين بس، وأضيفها للصرفيات والكريتورز تلقائياً\n• أجاوبك: «شكد الباقي على سارة؟» «منو ماخذ فلوس؟» «شكد ربحت هالشهر؟»\n\nجرّب: دزلي رابط شيت كامبين منشور، أو گلي «أضف كريتور اسمه أحمد سوبر كي 12345 سعره 50 ألف»، أو الصق صورة تحويل.";

const newConversation = (model) => ({
  id: "c" + Date.now() + Math.random().toString(36).slice(2, 7),
  title: "محادثة جديدة",
  messages: [{ role: "ai", type: "text", text: WELCOME_TEXT }],
  apiHistory: [],
  model: model || "claude-sonnet-4-6",
  createdAt: Date.now(),
});

// ============================================================================
// المكوّن الرئيسي
// ============================================================================
function App() {
  const [authed, setAuthed] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinErr, setPinErr] = useState(false);

  const [data, setData] = useState(EMPTY);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("overview");
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved

  // تحميل أولي
  useEffect(() => {
    (async () => {
      const d = await loadAll();
      if (d) setData({ ...EMPTY, ...d });
      setLoaded(true);
    })();
  }, []);

  // حفظ تلقائي عند أي تغيير
  useEffect(() => {
    if (!loaded) return;
    setSaveState("saving");
    const t = setTimeout(async () => {
      await saveAll(data);
      setSaveState("saved");
      setTimeout(() => setSaveState("idle"), 1500);
    }, 400);
    return () => clearTimeout(t);
  }, [data, loaded]);

  // ---- حسابات مشتقة --------------------------------------------------------
  const calc = useMemo(() => {
    const creatorsDue = data.creators.reduce(
      (s, c) => s + (Number(c.amount) || 0),
      0
    );
    const creatorsPaid = data.creators.reduce(
      (s, c) => s + (Number(c.paid) || 0),
      0
    );
    const creatorsOutstanding = creatorsDue - creatorsPaid;

    const revenue = data.campaigns.reduce(
      (s, c) => s + (Number(c.revenue) || 0),
      0
    );
    const campaignCost = data.campaigns.reduce(
      (s, c) => s + (Number(c.cost) || 0),
      0
    );
    const grossProfit = revenue - campaignCost;

    const companyExp = data.expenses
      .filter((e) => e.type === "company")
      .reduce((s, e) => s + (Number(e.amount) || 0), 0);
    const personalExp = data.expenses
      .filter((e) => e.type === "personal")
      .reduce((s, e) => s + (Number(e.amount) || 0), 0);

    // الرصيد = رأس المال + المدفوع للشركة (الإيراد) - تكاليف الكامبينات - مدفوعات الكريتورز المدفوعة فعلاً - الصرفيات
    const companyBalance =
      (Number(data.capital) || 0) +
      revenue -
      campaignCost -
      creatorsPaid -
      companyExp -
      personalExp;

    const netProfit = grossProfit - companyExp;

    return {
      creatorsDue,
      creatorsPaid,
      creatorsOutstanding,
      revenue,
      campaignCost,
      grossProfit,
      companyExp,
      personalExp,
      companyBalance,
      netProfit,
    };
  }, [data]);

  // توزيع الأرباح بين الشركاء عبر كل الكامبينات
  const partnerTotals = useMemo(() => {
    const map = {};
    data.campaigns.forEach((c) => {
      const profit = (Number(c.revenue) || 0) - (Number(c.cost) || 0);
      (c.splits || []).forEach((s) => {
        const share = (profit * (Number(s.pct) || 0)) / 100;
        map[s.name] = (map[s.name] || 0) + share;
      });
    });
    return Object.entries(map)
      .map(([name, amount]) => ({ name, amount }))
      .sort((a, b) => b.amount - a.amount);
  }, [data.campaigns]);

  // ---- مُعدّلات البيانات ---------------------------------------------------
  const upd = useCallback((fn) => setData((d) => fn(structuredClone(d))), []);

  // ---- شاشة الدخول ---------------------------------------------------------
  if (!authed) {
    return (
      <Shell>
        <div style={S.lockWrap}>
          <div style={S.lockCard}>
            <div style={S.lockIcon}>🔒</div>
            <h1 style={S.lockTitle}>UGC Iraq — مالية</h1>
            <p style={S.lockSub}>منطقة الادمنز فقط. أدخل كلمة السر للمتابعة.</p>
            <input
              type="password"
              inputMode="numeric"
              value={pinInput}
              onChange={(e) => {
                setPinInput(e.target.value);
                setPinErr(false);
              }}
              onKeyDown={(e) => {
                if (e.key === "Enter") {
                  if (pinInput === PIN) setAuthed(true);
                  else setPinErr(true);
                }
              }}
              placeholder="••••"
              style={{ ...S.lockInput, borderColor: pinErr ? "#E24B4A" : "#D3D1C7" }}
              autoFocus
            />
            {pinErr && <div style={S.lockErr}>كلمة السر غلط</div>}
            <button
              style={S.lockBtn}
              onClick={() => {
                if (pinInput === PIN) setAuthed(true);
                else setPinErr(true);
              }}
            >
              دخول
            </button>
          </div>
        </div>
      </Shell>
    );
  }

  if (!loaded) {
    return (
      <Shell>
        <div style={{ ...S.lockWrap }}>
          <div style={{ color: "#888780", fontSize: 15 }}>...يحمّل البيانات</div>
        </div>
      </Shell>
    );
  }

  // ---- الواجهة الرئيسية -----------------------------------------------------
  const tabs = [
    { id: "overview", label: "نظرة عامة", icon: "📊" },
    { id: "creators", label: "مدفوعات الكريتورز", icon: "🎬" },
    { id: "chat", label: "المساعد الذكي", icon: "🤖" },
    { id: "campaigns", label: "الكامبينات والأرباح", icon: "📈" },
    { id: "expenses", label: "الصرفيات", icon: "💸" },
    { id: "settings", label: "إعدادات", icon: "⚙️" },
  ];

  return (
    <Shell>
      <div style={S.app}>
        {/* الشريط العلوي */}
        <header style={S.header}>
          <div style={S.brand}>
            <div style={S.brandMark}>UGC</div>
            <div>
              <div style={S.brandName}>المالية الداخلية</div>
              <div style={S.brandSub}>UGC Iraq</div>
            </div>
          </div>
          <div style={S.headerRight}>
            <SaveBadge state={saveState} />
            <button style={S.logoutBtn} onClick={() => setAuthed(false)}>
              قفل
            </button>
          </div>
        </header>

        {/* التبويبات */}
        <nav style={S.tabBar}>
          {tabs.map((t) => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              style={{
                ...S.tab,
                ...(tab === t.id ? S.tabActive : {}),
              }}
            >
              <span style={{ fontSize: 15 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </nav>

        <main style={S.main}>
          {tab === "overview" && (
            <Overview calc={calc} partnerTotals={partnerTotals} data={data} />
          )}
          {tab === "creators" && (
            <CreatorsTab data={data} upd={upd} calc={calc} />
          )}
          {tab === "chat" && <ChatTab data={data} upd={upd} />}
          {tab === "campaigns" && (
            <CampaignsTab data={data} upd={upd} partnerTotals={partnerTotals} />
          )}
          {tab === "expenses" && <ExpensesTab data={data} upd={upd} calc={calc} />}
          {tab === "settings" && (
            <SettingsTab data={data} setData={setData} upd={upd} />
          )}
        </main>
      </div>
    </Shell>
  );
}

// ============================================================================
// نظرة عامة
// ============================================================================
function Overview({ calc, partnerTotals, data }) {
  const cards = [
    {
      label: "رصيد الشركة الحالي",
      value: calc.companyBalance,
      hint: "رأس المال + الإيرادات − كل المصروفات والمدفوعات",
      big: true,
      tone: calc.companyBalance >= 0 ? "good" : "bad",
    },
    {
      label: "باقي على الكريتورز",
      value: calc.creatorsOutstanding,
      hint: `مدفوع ${fmt(calc.creatorsPaid)} من ${fmt(calc.creatorsDue)}`,
      tone: calc.creatorsOutstanding > 0 ? "warn" : "good",
    },
    {
      label: "إجمالي الإيرادات",
      value: calc.revenue,
      hint: `من ${data.campaigns.length} كامبين`,
    },
    {
      label: "صافي الربح",
      value: calc.netProfit,
      hint: "الربح الإجمالي − صرفيات الشركة",
      tone: calc.netProfit >= 0 ? "good" : "bad",
    },
  ];

  return (
    <div>
      <SectionTitle>الملخّص المالي</SectionTitle>
      <div style={S.cardGrid}>
        {cards.map((c, i) => (
          <StatCard key={i} {...c} />
        ))}
      </div>

      <div style={S.twoCol}>
        <div style={S.panel}>
          <div style={S.panelTitle}>توزيع الأرباح على الشركاء</div>
          {partnerTotals.length === 0 ? (
            <Empty text="ماكو شركاء بعد. أضف توزيع داخل أي كامبين." />
          ) : (
            <div>
              {partnerTotals.map((p, i) => {
                const max = Math.max(...partnerTotals.map((x) => Math.abs(x.amount)), 1);
                const w = (Math.abs(p.amount) / max) * 100;
                return (
                  <div key={i} style={S.barRow}>
                    <div style={S.barLabel}>{p.name}</div>
                    <div style={S.barTrack}>
                      <div
                        style={{
                          ...S.barFill,
                          width: `${w}%`,
                          background: p.amount >= 0 ? "#0F9E8E" : "#E24B4A",
                        }}
                      />
                    </div>
                    <div style={S.barVal}>{fmt(p.amount)}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={S.panel}>
          <div style={S.panelTitle}>أين تذهب الأموال</div>
          <FlowRow label="الإيرادات الداخلة" value={calc.revenue} tone="good" />
          <FlowRow label="تكاليف الكامبينات" value={-calc.campaignCost} />
          <FlowRow
            label="مدفوع للكريتورز فعلاً"
            value={-calc.creatorsPaid}
          />
          <FlowRow label="صرفيات الشركة" value={-calc.companyExp} />
          <FlowRow label="صرفيات شخصية" value={-calc.personalExp} />
          <div style={S.flowDivider} />
          <FlowRow
            label="الرصيد الناتج"
            value={calc.companyBalance}
            bold
            tone={calc.companyBalance >= 0 ? "good" : "bad"}
          />
        </div>
      </div>

      {calc.creatorsOutstanding > 0 && (
        <div style={S.alert}>
          <span style={{ fontSize: 16 }}>⚠️</span>
          عندك <b>{fmt(calc.creatorsOutstanding)}</b> باقية غير مدفوعة للكريتورز.
          راجع تبويب «مدفوعات الكريتورز» حتى تشوف المن.
        </div>
      )}
    </div>
  );
}

// ============================================================================
// تبويب مدفوعات الكريتورز
// ============================================================================
function CreatorsTab({ data, upd }) {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const statusOf = (c) => {
    if (c.payStatus && STATUS[c.payStatus]) return c.payStatus; // اختيار يدوي له الأولوية
    const a = Number(c.amount) || 0;
    const p = Number(c.paid) || 0;
    if (p <= 0) return "unpaid";
    if (p >= a) return "paid";
    return "partial";
  };
  const pubOf = (c) => (c.pubStatus === "published" ? "published" : "unpublished");

  const q = search.trim().toLowerCase();
  const list = data.creators.filter((c) => {
    const ps = statusOf(c);
    const pub = c.pubStatus === "published";
    const rem = (Number(c.amount) || 0) - (Number(c.paid) || 0);
    let passFilter = true;
    if (filter === "all") passFilter = true;
    else if (filter === "published") passFilter = pub;
    else if (filter === "unpublished") passFilter = !pub;
    else if (filter === "published_unpaid") passFilter = pub && rem > 0;
    else passFilter = ps === filter; // paid / partial / unpaid
    if (!passFilter) return false;
    if (!q) return true;
    return (
      (c.name || "").toLowerCase().includes(q) ||
      (c.handle || "").toLowerCase().includes(q) ||
      (c.phone || "").toLowerCase().includes(q) ||
      (c.superKey || "").toLowerCase().includes(q) ||
      (c.campaign || "").toLowerCase().includes(q)
    );
  });

  const blank = () => ({
    id: uid(),
    name: "",
    handle: "",
    phone: "",
    superKey: "",
    campaign: "",
    amount: "",
    paid: "",
    payStatus: "",
    pubStatus: "unpublished",
    pubLink: "",
    date: todayISO(),
    note: "",
  });

  // تغيير سريع للحالة من الجدول
  const setPayStatus = (id, val) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === id);
      if (i >= 0) d.creators[i].payStatus = val;
      return d;
    });
  const setPubStatus = (id, val) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === id);
      if (i >= 0) {
        d.creators[i].pubStatus = val;
        if (val === "unpublished") d.creators[i].pubLink = ""; // امسح الرابط إذا رجع غير منشور
      }
      return d;
    });

  const save = (rec) => {
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === rec.id);
      if (i >= 0) d.creators[i] = rec;
      else d.creators.unshift(rec);
      return d;
    });
    setEditing(null);
  };

  const del = (id) =>
    upd((d) => {
      d.creators = d.creators.filter((x) => x.id !== id);
      return d;
    });

  const markPaid = (c) =>
    upd((d) => {
      const i = d.creators.findIndex((x) => x.id === c.id);
      if (i >= 0) d.creators[i].paid = d.creators[i].amount;
      return d;
    });

  return (
    <div>
      <div style={S.tabHead}>
        <SectionTitle noMargin>مدفوعات الكريتورز</SectionTitle>
        <button style={S.primaryBtn} onClick={() => setEditing(blank())}>
          + كريتور جديد
        </button>
      </div>

      <div style={S.searchWrap}>
        <span style={S.searchIcon}>🔍</span>
        <input
          style={S.searchInput}
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="دور على كريتور بالاسم، الموبايل، أو السوبر كي..."
        />
        {search && (
          <button style={S.searchClear} onClick={() => setSearch("")}>✕</button>
        )}
      </div>

      {q && (
        <div style={S.lookupBar}>
          {list.length === 0 ? (
            <span style={{ color: "#A8A69C" }}>ماكو نتيجة لـ «{search}»</span>
          ) : (
            <span style={{ color: "#5F5E5A" }}>
              <b style={{ color: "#0A4A42" }}>{list.length}</b> نتيجة
            </span>
          )}
        </div>
      )}

      {q && list.length > 0 && (
        <div style={S.lookupCards}>
          {list.slice(0, 8).map((c) => (
            <div key={c.id} style={S.lookupCard}>
              <div style={S.lookupName}>{c.name || "—"}</div>
              {c.handle && <div style={S.lookupHandle}>{c.handle}</div>}
              <div style={S.lookupRow}>
                <span style={S.lookupKey}>📱 الموبايل</span>
                <span style={S.lookupVal}>{c.phone || "—"}</span>
              </div>
              <div style={S.lookupRow}>
                <span style={S.lookupKey}>🔑 السوبر كي</span>
                <span style={{ ...S.lookupVal, fontWeight: 700, color: "#0A4A42" }}>
                  {c.superKey || "—"}
                </span>
              </div>

function ChatTab({ data, upd }) {
  // ---- إدارة المحادثات (محفوظة دائماً) ----
  const conversations = data.conversations && data.conversations.length ? data.conversations : [];
  // تأكد من وجود محادثة نشطة
  React.useEffect(() => {
    if (!conversations.length) {
      const c = newConversation(data.defaultModel);
      upd((d) => {
        d.conversations = [c];
        d.activeConvId = c.id;
        return d;
      });
    } else if (!data.activeConvId || !conversations.find((c) => c.id === data.activeConvId)) {
      const firstId = conversations[0].id;
      upd((d) => {
        d.activeConvId = firstId;
        return d;
      });
    }
    // eslint-disable-next-line
  }, [conversations.length, data.activeConvId]);

  const activeConv = conversations.find((c) => c.id === data.activeConvId) || conversations[0] || null;
  const messages = activeConv ? activeConv.messages : [{ role: "ai", type: "text", text: WELCOME_TEXT }];
  const curModel = activeConv ? activeConv.model : data.defaultModel;

  const [busy, setBusy] = useState(false);
  const [textInput, setTextInput] = useState("");
  const [pendingImg, setPendingImg] = useState(null);
  const [pendingCsv, setPendingCsv] = useState(null); // {name, text} ملف CSV مرفوع
  const [publishReminder, setPublishReminder] = useState(null); // {url} بعد معالجة شيت — تذكير بإغلاق النشر
  const [showConvList, setShowConvList] = useState(false); // إظهار قائمة المحادثات
  const [showModels, setShowModels] = useState(false); // إظهار قائمة الموديلات
  const scrollRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const taRef = React.useRef(null);

  // مساعدات تعديل المحادثة النشطة (تحفظ دائماً عبر upd)
  const patchActive = (fn) => {
    upd((d) => {
      const conv = (d.conversations || []).find((c) => c.id === d.activeConvId);
      if (conv) fn(conv);
      return d;

لمن يجيك بالرسالة "بيانات الشيت المقروءة تلقائياً بصيغة CSV"، هاي بيانات كامبين كاملة من Google Sheet. سوي التالي بالترتيب:

  // ---- قراءة Google Sheets المنشور ---------------------------------------
  // يستخرج معرّف الشيت و gid من أي رابط، ويبني رابط CSV قابل للقراءة من المتصفح
  // يرجّع قائمة روابط CSV مرشّحة نجرّبها بالترتيب (لأن بعض الصيغ تنحجب بالـCORS)
  const parseSheetUrls = (url) => {
    const candidates = [];
    try {
      const gidM = url.match(/[#&?]gid=([0-9]+)/);
      const gid = gidM ? gidM[1] : null;

      // صيغة النشر للعامة: /spreadsheets/d/e/2PACX-.../pubhtml أو /pub
      const pm = url.match(/\/spreadsheets\/d\/e\/([a-zA-Z0-9-_]+)/);
      if (pm && pm[1]) {
        const id = pm[1];
        candidates.push(`https://docs.google.com/spreadsheets/d/e/${id}/pub?output=csv${gid ? `&gid=${gid}` : ""}`);
        candidates.push(`https://docs.google.com/spreadsheets/d/e/${id}/pub?single=true&output=csv${gid ? `&gid=${gid}` : ""}`);
        return candidates;
      }

      // الصيغة العادية: /spreadsheets/d/SHEET_ID/edit#gid=GID
      const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (m && m[1]) {
        const id = m[1];
        candidates.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv${gid ? `&gid=${gid}` : ""}`);
        candidates.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv${gid ? `&gid=${gid}` : ""}`);
        return candidates;
      }
    } catch (e) {}
    return candidates;
  };

  const detectSheetUrl = (txt) => {
    const m = txt.match(/https?:\/\/docs\.google\.com\/spreadsheets\/[^\s]+/);
    return m ? m[0] : null;
  };

  // يجرّب كل رابط مرشّح لحد ما يلگي CSV صحيح (قراءة مباشرة من المتصفح)
  const fetchSheetCsv = async (urls) => {
    let lastErr = "fetch_failed";
    for (const u of urls) {
      try {
        const resp = await fetch(u);
        if (!resp.ok) {
          lastErr = "fetch_failed";
          continue;
        }
        const text = await resp.text();
        // إذا رجع HTML بدل CSV معناها الشيت مو منشور أو الصيغة غلط
        if (text.trim().startsWith("<") || text.includes("<!DOCTYPE") || text.includes("<html")) {
          lastErr = "not_published";
          continue;
        }
        if (text.trim().length === 0) {
          lastErr = "fetch_failed";
          continue;
        }
        return text; // نجح
      } catch (e) {
        lastErr = "fetch_failed";
      }
    }
    throw new Error(lastErr);
  };

  // قراءة الشيت عبر الخادم الوسيط (يتجاوز حجب CORS تماماً)
  // طلب مع مهلة زمنية (timeout) — يتجنب التعليق للأبد
  const fetchWithTimeout = async (url, ms) => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try {
      const resp = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      return resp;
    } catch (e) {
      clearTimeout(t);
      throw e;
    }
  };

  const fetchViaServer = async (serverUrl, sheetUrl, onWake) => {
    const base = serverUrl.replace(/\/+$/, ""); // شيل أي / زايدة بالنهاية
    const endpoint = `${base}/sheet?url=${encodeURIComponent(sheetUrl)}`;

    // الخادم المجاني ممكن يكون نايم — نجرّب عدة مرات وننتظر بينها (cold start)
    let lastErr = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const resp = await fetchWithTimeout(endpoint, 60000); // مهلة دقيقة (الخادم يصحى)
        const text = await resp.text();
        if (!resp.ok) {
          try {
            const j = JSON.parse(text);
            throw new Error(j.error || "fetch_failed");
          } catch (e) {
            throw new Error(e.message || "fetch_failed");
          }
        }
        if (text.trim().startsWith("<") || text.includes("<html") || text.trim().length === 0) {
          throw new Error("not_published");
        }
        return text; // نجح
      } catch (e) {
        lastErr = e;
        // أخطاء واضحة ما نعيدها
        if (e.message === "not_published" || e.message === "bad_url") throw e;
        // خطأ شبكة أو timeout — يمكن الخادم نايم، ننتظر ونعيد
        if (attempt === 0 && onWake) onWake();
        await new Promise((r) => setTimeout(r, 4000));
      }
    }
    throw lastErr || new Error("fetch_failed");
  };

  const send = async () => {
    if (busy) return;
    const txt = textInput.trim();
    if (!txt && !pendingImg && !pendingCsv) return;

    if (pendingImg) addMsg({ role: "user", type: "image", src: pendingImg.dataUrl, caption: txt });
    else if (pendingCsv) addMsg({ role: "user", type: "file", name: pendingCsv.name, caption: txt });
    else if (txt) addMsg({ role: "user", type: "text", text: txt });

    // كشف رابط Google Sheets ومحاولة قراءته
    let sheetCsv = null;
    let sheetError = null;
    const sheetUrl = txt ? detectSheetUrl(txt) : null;
    if (sheetUrl) {
      addMsg({ role: "ai", type: "action", text: "أقرا بيانات الشيت..." });
      setBusy(true);
      // إذا الخادم الوسيط مضبوط، جرّبه أول (يتجاوز حجب Google تماماً)
      const serverUrl = (data.serverUrl || "").trim();
      if (serverUrl) {
        try {
          sheetCsv = await fetchViaServer(serverUrl, sheetUrl, () => {
            addMsg({ role: "ai", type: "action", text: "الخادم يصحى من النوم... (ممكن ياخذ نص دقيقة أول مرة)" });
          });
        } catch (e) {
          sheetError = e.message === "not_published" ? "not_published" : e.message === "bad_url" ? "bad_url" : "fetch_failed";
        }
      }
      // إذا ماكو خادم أو فشل، جرّب القراءة المباشرة من المتصفح
      if (!sheetCsv) {
        const csvUrls = parseSheetUrls(sheetUrl);
        if (csvUrls.length > 0) {
          try {
            sheetCsv = await fetchSheetCsv(csvUrls);
            sheetError = null; // نجحت القراءة المباشرة
          } catch (e) {
            if (!sheetError) sheetError = e.message === "not_published" ? "not_published" : "fetch_failed";
          }
        } else if (!sheetError) {
          sheetError = "bad_url";
        }
      }
    }

    // إذا فشلت قراءة الشيت، وضّح للمستخدم ووقف
    if (sheetUrl && sheetError) {
      const hasServer = (data.serverUrl || "").trim().length > 0;
      const msg =
        sheetError === "not_published"
          ? "ما گدرت أقرا الشيت — يبدو إنه مو منشور للعامة. روح للشيت: File ← Share ← Publish to web، اضغط Publish، وبعدين دزلي الرابط مرة ثانية."
          : sheetError === "bad_url"
          ? "الرابط مو رابط Google Sheets صحيح. تأكد إنه رابط شيت."
          : hasServer
          ? "ما گدرت أوصل للشيت عن طريق الخادم. تأكد إن: (١) رابط الخادم صحيح بالإعدادات، (٢) الخادم شغّال، (٣) الشيت منشور. جرّب مرة ثانية."
          : "ما گدرت أوصل للشيت — Google حجب القراءة المباشرة من المتصفح. للقراءة التلقائية، اضبط رابط الخادم الوسيط من تبويب «إعدادات». أو مؤقتاً: صدّر الشيت CSV وارفعه بزر 📎.";
      addMsg({ role: "ai", type: "text", text: msg });
      setTextInput("");
      setBusy(false);
      return;
    }

    // بيانات CSV من ملف مرفوع تُعامل مثل بيانات شيت
    const csvData = sheetCsv || (pendingCsv ? pendingCsv.text : null);

    const content = [];
    if (pendingImg)
      content.push({
        type: "image",
        source: { type: "base64", media_type: pendingImg.mediaType, data: pendingImg.b64 },
      });
    let userText = txt || (pendingImg ? "اقرا هالصورة وسجّل الدفعة إذا تعرفت على الكريتور." : "اقرا بيانات هالشيت وعالج الكامبين.");
    if (csvData) {
      userText += `\n\n[بيانات الشيت بصيغة CSV — اقرأها وتعرّف على الكامبين واحسب التكلفة من المعتمدين بس]:\n${csvData}`;
    }
    content.push({ type: "text", text: userText });

    // سجل المحادثة السابق + رسالة المستخدم الجديدة (نمرّره لـ runConversation)
    const seedHistory = [...(activeConv ? activeConv.apiHistory : []), { role: "user", content }];
    pushApi({ role: "user", content });
    // عنونة المحادثة تلقائياً من أول رسالة للمستخدم
    if (txt && activeConv && (activeConv.title === "محادثة جديدة" || !activeConv.title)) {
      const newTitle = txt.slice(0, 40) + (txt.length > 40 ? "…" : "");
      patchActive((conv) => { conv.title = newTitle; });
    }

    setTextInput("");
    setPendingImg(null);
    setPendingCsv(null);
    if (taRef.current) taRef.current.style.height = "auto";
    setBusy(true);

    try {
      await runConversation(seedHistory);
      // إذا عالجنا شيت من رابط بنجاح، ذكّر المستخدم يسكّر النشر (مو للملف المرفوع)
      if (sheetCsv && sheetUrl) {
        setPublishReminder({ url: sheetUrl });
      }
    } catch (e) {
      addMsg({ role: "ai", type: "text", text: "صار خطأ بالاتصال. تأكد من الانترنت وجرّب مرة ثانية." });
    }
    setBusy(false);
  };

  const runConversation = async (seedHistory) => {
    // نحسب عنوان الخادم: serverUrl إذا مضبوط، وإلا نفس الموقع (التطبيق منشور مع الخادم)
    let apiBase = (data.serverUrl || "").trim().replace(/\/+$/, "");
    if (!apiBase && typeof window !== "undefined" && window.location && window.location.origin.startsWith("http")) {
      apiBase = window.location.origin;
    }
    const claudeEndpoint = apiBase ? `${apiBase}/claude` : "/claude";
    const modelToUse = (activeConv && activeConv.model) || data.defaultModel || "claude-sonnet-4-6";

    // نسخة عمل محلية من سجل المحادثة (تبدي بالسجل السابق + رسالة المستخدم الجديدة)
    let history = seedHistory.slice();

    let guard = 0;
    while (guard++ < 10) {
      const resp = await fetch(claudeEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: modelToUse,
          max_tokens: 4000,
          system: SYSTEM(),
          tools,
          messages: history,
        }),
      });
      const json = await resp.json();
      if (json.type === "error" || json.error || !json.content) {
        const errDetail = json.error ? (typeof json.error === "string" ? json.error : (json.error.message || json.error.type || "")) : "";
        addMsg({
          role: "ai",
          type: "text",
          text: errDetail === "no_api_key"
            ? "الخادم ما عنده مفتاح API. تأكد إنك ضفت ANTHROPIC_API_KEY بإعدادات Render (Environment)."
            : "ما گدرت أكمّل الطلب. " + (errDetail ? "(" + errDetail + ") " : "") + "جرّب مرة ثانية.",
        });
        // احفظ السجل لحد هنا
        patchActive((conv) => { conv.apiHistory = history; });
        return;
      }

      const textBlocks = json.content.filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      if (textBlocks) addMsg({ role: "ai", type: "text", text: textBlocks });

      history.push({ role: "assistant", content: json.content });

      const toolUses = json.content.filter((b) => b.type === "tool_use");
      if (toolUses.length === 0) {
        patchActive((conv) => { conv.apiHistory = history; });
        return;
      }

      const toolResults = [];
      for (const tu of toolUses) {
        const out = runTool(tu.name, tu.input || {});
        addMsg({ role: "ai", type: "action", tool: tu.name, text: out });
        toolResults.push({ type: "tool_result", tool_use_id: tu.id, content: out });
      }
      history.push({ role: "user", content: toolResults });
    }
    // وصلنا للحد الأقصى — احفظ السجل
    patchActive((conv) => { conv.apiHistory = history; });
  };

  const onKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };

  const autoGrow = (e) => {
    setTextInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
  };

  const quickPrompts = [
    "شكد مجموع الباقي على الكريتورز؟",
    "منو الكريتورز اللي باقي عليهم فلوس؟",
    "شكد ربحت من كل الكامبينات؟",
  ];

  return (
    <div>
      <div style={S.chatTopBar}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <SectionTitle noMargin>المساعد الذكي</SectionTitle>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, position: "relative" }}>
          {/* اختيار الموديل */}
          <div style={{ position: "relative" }}>
            <button style={S.modelBtn} onClick={() => { setShowModels((v) => !v); setShowConvList(false); }} title="اختر الموديل">
              <span style={S.modelDot} />
              {(MODELS.find((m) => m.id === curModel) || MODELS[1]).name}
              <span style={{ fontSize: 10, opacity: 0.7 }}>▾</span>
            </button>
            {showModels && (
              <div style={S.dropdown}>
                <div style={S.dropdownTitle}>اختر الموديل لهالمحادثة</div>
                {MODELS.map((m) => (
                  <button key={m.id} style={{ ...S.modelItem, ...(m.id === curModel ? S.modelItemActive : {}) }} onClick={() => setModel(m.id)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontWeight: 700 }}>{m.name}</span>
                      <span style={S.modelBadge}>{m.badge}</span>
                    </div>
                    <div style={{ fontSize: 11.5, color: "#888780", marginTop: 2 }}>{m.desc}</div>
                  </button>
                ))}
              </div>
            )}
          </div>
          {/* محادثة جديدة */}
          <button style={S.newChatBtn} onClick={startNewConversation} title="محادثة جديدة">
            + جديدة
          </button>
          {/* قائمة المحادثات */}
          <button style={S.convListBtn} onClick={() => { setShowConvList((v) => !v); setShowModels(false); }} title="المحادثات">
            ☰ {conversations.length}
          </button>
          {showConvList && (
            <div style={{ ...S.dropdown, left: 0, right: "auto", minWidth: 260 }}>
              <div style={S.dropdownTitle}>المحادثات ({conversations.length})</div>
              <div style={{ maxHeight: 320, overflowY: "auto" }}>
                {conversations.map((c) => (
                  <div key={c.id} style={{ ...S.convItem, ...(c.id === data.activeConvId ? S.convItemActive : {}) }}>
                    <button style={S.convItemMain} onClick={() => switchConversation(c.id)}>
                      <div style={{ fontWeight: c.id === data.activeConvId ? 700 : 500, fontSize: 13, color: "#2B2A28", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {c.title || "محادثة"}
                      </div>
                      <div style={{ fontSize: 11, color: "#A8A6A0" }}>
                        {(MODELS.find((m) => m.id === c.model) || {}).name || "Sonnet"} · {c.messages.length - 1} رسالة
                      </div>
                    </button>
                    {conversations.length > 1 && (
                      <button style={S.convDelBtn} onClick={() => deleteConversation(c.id)} title="حذف">
                        🗑
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      <div style={S.chatWindow} ref={scrollRef}>
        {messages.map((m, i) => (
          <ChatBubble key={i} m={m} />
        ))}

        {busy && (
          <div style={S.aiRow}>
            <div style={S.aiAvatar}>🤖</div>
            <div style={S.typingBubble}>
              <span style={S.dot} />
              <span style={{ ...S.dot, animationDelay: "0.2s" }} />
              <span style={{ ...S.dot, animationDelay: "0.4s" }} />
              <span style={{ marginRight: 8, fontSize: 13, color: "#888780" }}>يفكر...</span>
            </div>
          </div>
        )}
      </div>

      {publishReminder && (
        <div style={S.reminderCard}>
          <div style={S.reminderTop}>
            <span style={S.reminderIcon}>🔔</span>
            <div style={{ flex: 1 }}>
              <div style={S.reminderTitle}>تذكير: سكّر النشر مال الشيت</div>
              <div style={S.reminderText}>
                خلّصت معالجة الكامبين. إذا تريد الشيت ما يبقى مكشوف للعامة، روح سكّر النشر: افتح الشيت ← File ← Share ← Publish to web ← <b>Stop publishing</b>.
              </div>
            </div>
          </div>
          <div style={S.reminderActions}>
            <a href={publishReminder.url} target="_blank" rel="noopener noreferrer" style={S.reminderLink}>
              🔗 افتح الشيت
            </a>
            <button style={S.reminderDone} onClick={() => setPublishReminder(null)}>
              ✓ سكّرته
            </button>
            <button style={S.reminderLater} onClick={() => setPublishReminder(null)}>
              لاحقاً
            </button>
          </div>
        </div>
      )}

      {messages.length <= 1 && (
        <div style={S.quickRow}>
          {quickPrompts.map((q, i) => (
            <button
              key={i}
              style={S.quickChip}
              onClick={() => {
                setTextInput(q);
                setTimeout(send, 50);
              }}
            >
              {q}
            </button>
          ))}
        </div>
      )}

      {pendingImg && (
        <div style={S.imgPreview}>
          <img src={pendingImg.dataUrl} alt="مرفق" style={S.imgPreviewThumb} />
          <span style={{ fontSize: 13, color: "#5F5E5A", flex: 1 }}>
            صورة جاهزة للإرسال — اكتب تعليق (اختياري) واضغط إرسال
          </span>
          <button style={S.imgRemove} onClick={() => setPendingImg(null)}>
            ✕
          </button>
        </div>
      )}

      {pendingCsv && (
        <div style={S.imgPreview}>
          <span style={S.fileChipIcon}>📄</span>
          <span style={{ fontSize: 13, color: "#5F5E5A", flex: 1 }}>
            <b>{pendingCsv.name}</b> — ملف جاهز. اكتب اسم الكامبين (اختياري) واضغط إرسال وآني أعالجه.
          </span>
          <button style={S.imgRemove} onClick={() => setPendingCsv(null)}>
            ✕
          </button>
        </div>
      )}

      <div style={S.composer}>
        <button style={S.attachBtn} onClick={() => fileRef.current?.click()} disabled={busy} title="ارفع صورة أو ملف CSV">
          📎
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="image/*,.csv,.tsv,.txt,text/csv,text/plain"
          style={{ display: "none" }}
          onChange={(e) => {
            const f = e.target.files[0];
            if (f) attachFile(f);
            e.target.value = "";
          }}
        />
        <textarea
          ref={taRef}
          style={S.composerInput}
          value={textInput}
          onChange={autoGrow}
          onKeyDown={onKeyDown}
          placeholder="اكتب رسالتك... (مثلاً: أضف كريتور اسمه علي سوبر كي 9988 سعره 40 ألف)"
          rows={1}
        />
        <button style={S.sendBtn} onClick={send} disabled={busy || (!textInput.trim() && !pendingImg && !pendingCsv)}>
          إرسال
        </button>
      </div>

      <div style={S.chatNote}>
        💡 المساعد يقرا شيتات Google المنشورة (دزّ الرابط)، أو ارفع ملف CSV بزر 📎 إذا الرابط ما اشتغل. ويقرا سكرين شوت Super Qi. لقراءة شيت كامبين: انشره (Publish to web) أو صدّره CSV وارفعه، وآني أحسب التكلفة من المعتمدين بس.
      </div>
    </div>
  );
}

function ChatBubble({ m }) {
  if (m.role === "user") {
    return (
      <div style={S.userRow}>
        {m.type === "image" ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
            <img src={m.src} alt="مرفق" style={S.userImg} />
            {m.caption ? <div style={S.userBubble}>{m.caption}</div> : null}
          </div>
        ) : m.type === "file" ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
            <div style={S.userFile}>📄 {m.name}</div>
            {m.caption ? <div style={S.userBubble}>{m.caption}</div> : null}
          </div>
        ) : (
          <div style={S.userBubble}>{m.text}</div>
        )}
      </div>
    );
  }
  if (m.type === "action") {
    return (
      <div style={S.aiRow}>
        <div style={S.aiAvatar}>🤖</div>
        <div style={S.actionCard}>
          <span style={S.actionDot}>✓</span>
          <span>{m.text}</span>
        </div>
      </div>
    );
  }
  return (
    <div style={S.aiRow}>
      <div style={S.aiAvatar}>🤖</div>
      <div style={m.type === "success" ? S.successBubble : S.aiBubble}>
        {m.text.split("\n").map((line, i) => (
          <div key={i}>{line || "\u00A0"}</div>
        ))}
      </div>
    </div>
  );
}

function SettingsTab({ data, setData, upd }) {
  const [cap, setCap] = useState(data.capital || 0);
  const [srv, setSrv] = useState(data.serverUrl || "");
  const [srvTest, setSrvTest] = useState(""); // نتيجة فحص الخادم
  const [msg, setMsg] = useState("");

  const testServer = async () => {
    const base = (srv || "").trim().replace(/\/+$/, "");
    if (!base) {
      setSrvTest("✕ اكتب رابط الخادم أول");
      return;
    }
    if (!/^https:\/\//.test(base)) {
      setSrvTest("✕ الرابط لازم يبدي بـ https://");
      return;
    }
    setSrvTest("... أفحص الخادم (ممكن ياخذ نص دقيقة إذا نايم)");
    // نجرّب عدة مرات لأن الخادم المجاني ممكن يكون نايم
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 60000);
        const resp = await fetch(`${base}/health`, { signal: ctrl.signal });
        clearTimeout(t);
        const j = await resp.json();
        if (j && j.ok) {
          setSrvTest("✓ الخادم شغّال وجاهز");
          return;
        }
        setSrvTest("✕ الخادم رد بشكل غير متوقع");
        return;
      } catch (e) {
        if (attempt === 0) setSrvTest("... الخادم يصحى من النوم، انتظر شوية");
        await new Promise((r) => setTimeout(r, 4000));
      }
    }
    setSrvTest("✕ ما گدرت أوصل للخادم. تأكد إنه Live بـ Render، وإن الرابط صحيح كامل.");
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ugc-finance-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        setData({ ...EMPTY, ...parsed });
        setCap(parsed.capital || 0);
        setSrv(parsed.serverUrl || "");
        setMsg("✓ تم استيراد البيانات بنجاح");
        setTimeout(() => setMsg(""), 3000);
      } catch {
        setMsg("✕ الملف غير صالح");
        setTimeout(() => setMsg(""), 3000);
      }
    };
    reader.readAsText(file);
  };

  const counts = {
    creators: data.creators.length,
    campaigns: data.campaigns.length,
    expenses: data.expenses.length,
  };

  return (
    <div>
      <SectionTitle>الإعدادات والبيانات</SectionTitle>

      <div style={S.panel}>

          value={srv}
          onChange={(e) => {

          placeholder="https://your-server.onrender.com"
        />

                return d;

              setTimeout(() => setMsg(""), 2500);
            }}

            <span style={{ fontSize: 13, fontWeight: 600, color: srvTest.startsWith("✓") ? "#0F6E56" : srvTest.startsWith("✕") ? "#A32D2D" : "#888780" }}>

      </div>

        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button style={S.primaryBtn} onClick={exportData}>⬇ تصدير نسخة (JSON)</button>

            ⬆ استيراد نسخة

        </div>
      </div>

      <div style={{ ...S.panel, borderColor: "#F0997B" }}>
        <div style={{ ...S.panelTitle, color: "#993C1D" }}>منطقة الخطر</div>

        <button
          style={S.dangerBtn}
          onClick={() => {
            if (confirm("متأكد تريد تمسح كل البيانات؟ ما راح ترجع.")) {
              setData(EMPTY);
              setCap(0);
              setMsg("تم مسح كل البيانات");
              setTimeout(() => setMsg(""), 2500);
            }
          }}
        >
          مسح كل شي
        </button>
      </div>

      {msg && <div style={S.toast}>{msg}</div>}
    </div>
  );
}

// مكوّنات مشتركة
// ============================================================================
function Shell({ children }) {
  return (
    <div dir="rtl" style={S.shell}>
      <style>{`
        @keyframes ugcblink {
          0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
          40% { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 640px) {
          ::-webkit-scrollbar { width: 6px; }
        }
      `}</style>
      {children}
    </div>
  );
}

function SectionTitle({ children, noMargin }) {
  return <h2 style={{ ...S.sectionTitle, marginBottom: noMargin ? 0 : 16 }}>{children}</h2>;
}

function StatCard({ label, value, hint, big, tone, raw }) {
  const color =
    tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : tone === "warn" ? "#854F0B" : "#0A4A42";
  return (
    <div style={{ ...S.statCard, ...(big ? S.statCardBig : {}) }}>
      <div style={S.statLabel}>{label}</div>
      <div style={{ ...S.statValue, color, fontSize: big ? 34 : 26 }}>
        {raw ? value : fmt(value)}
      </div>
      {hint && <div style={S.statHint}>{hint}</div>}
    </div>
  );
}

function MiniStat({ label, value, tone, raw }) {
  const color = tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : "#2C2C2A";
  return (
    <div style={S.miniStat}>
      <div style={S.miniLabel}>{label}</div>
      <div style={{ ...S.miniValue, color }}>{raw ? value : fmt(value)}</div>
    </div>
  );
}

function FlowRow({ label, value, bold, tone }) {
  const color = tone === "good" ? "#0F6E56" : tone === "bad" ? "#A32D2D" : value < 0 ? "#993C1D" : "#2C2C2A";
  return (
    <div style={{ ...S.flowRow, fontWeight: bold ? 600 : 400 }}>
      <span style={{ color: "#5F5E5A" }}>{label}</span>
      <span style={{ color, fontVariantNumeric: "tabular-nums" }}>
        {value < 0 ? "−" : ""}{fmt(Math.abs(value))}
      </span>
    </div>
  );
}

function StatusPill({ status }) {
  const s = STATUS[status];
  return (
    <span style={{ ...S.pill, background: s.bg, color: s.t }}>
      <span style={{ width: 6, height: 6, borderRadius: 99, background: s.c, display: "inline-block" }} />
      {s.label}
    </span>
  );
}

function SaveBadge({ state }) {
  if (state === "idle") return null;
  return (
    <span style={S.saveBadge}>
      {state === "saving" ? "...يحفظ" : "✓ محفوظ"}
    </span>
  );
}

function Empty({ text }) {
  return <div style={S.empty}>{text}</div>;
}

function Field({ label, children }) {
  return (
    <div style={S.field}>
      <label style={S.fieldLabel}>{label}</label>
      {children}
    </div>
  );
}

function FormActions({ onSave, onCancel }) {
  return (
    <div style={S.formActions}>
      <button style={S.secondaryBtn} onClick={onCancel}>إلغاء</button>
      <button style={S.primaryBtn} onClick={onSave}>حفظ</button>
    </div>
  );
}

function Modal({ title, children, onClose, wide }) {
  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div
        style={{ ...S.modal, maxWidth: wide ? 560 : 440 }}
        onClick={(e) => e.stopPropagation()}
      >
        <div style={S.modalHead}>
          <span style={S.modalTitle}>{title}</span>
          <button style={S.modalClose} onClick={onClose}>✕</button>
        </div>
        <div style={S.modalBody}>{children}</div>
      </div>
    </div>
  );
}

<script>
(function () {
  function showError(msg) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = '<div id="boot"><div class="mark">UGC</div><div class="err">صار خطأ بتحميل التطبيق:<br>' + msg + '<br><br>جرب تحدث الصفحة (Ctrl+Shift+R).</div></div>';
    }
  }
  try {
    if (typeof Babel === "undefined" || typeof React === "undefined" || typeof ReactDOM === "undefined") {
      showError("ما گدر يحمل المكتبات من الانترنت. تأكد من اتصالك وحدث الصفحة.");
      return;
    }
    var source = document.getElementById("app-source").textContent;
    var out = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      sourceType: "script"
    }).code;
    var run = new Function(out);
    run();
  } catch (e) {
    showError((e && e.message) ? e.message : String(e));
    console.error(e);
  }
})();
</script>
